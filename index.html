<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive With You - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <nav class="sidebar close" id="sidebar">
        <div class="logo-details">
            <i class="fa-solid fa-ghost"></i>
            <span class="logo_name">Interactive With You</span>
        </div>
        
        <ul class="nav-links">
            <li>
                <a href="#" onclick="cargarSeccion('home')">
                    <i class="fa-solid fa-house"></i>
                    <span class="link_name">Inicio</span>
                </a>
            </li>
            
            <li>
                <div class="iocn-link" style="cursor:pointer;">
                    <a href="#">
                        <i class="fa-solid fa-layer-group"></i>
                        <span class="link_name">Funciones</span>
                    </a>
                    <i class="fa-solid fa-chevron-down arrow"></i>
                </div>
                <div class="sub-menu">
                    <div class="sub-menu-content">
                        <ul>
                            <li><a href="#" onclick="cargarSeccion('chat')">Widget de Chat</a></li>
                        </ul>
                    </div>
                </div>
            </li>

            <li>
                <a href="#" onclick="cargarSeccion('comunidad')">
                    <i class="fa-solid fa-users"></i>
                    <span class="link_name">Comunidad</span>
                </a>
            </li>

            <li>
                <a href="#" onclick="cargarSeccion('contacto')">
                    <i class="fa-solid fa-envelope"></i>
                    <span class="link_name">Contacto</span>
                </a>
            </li>

            <li id="auth-item">
                </li>
        </ul>
    </nav>

    <section class="home-section">
        <div class="home-content">
            <i class="fa-solid fa-bars" id="btn-menu"></i>
            <span class="text">Panel de Control</span>
        </div>

        <div id="main-container">
            </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
            authDomain: "interactivewithyou.firebaseapp.com",
            projectId: "interactivewithyou",
            storageBucket: "interactivewithyou.firebasestorage.app",
            messagingSenderId: "220446228684",
            appId: "1:220446228684:web:759044ab4365962d300269"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const sidebar = document.getElementById("sidebar");
        const btnMenu = document.getElementById("btn-menu");
        const authItem = document.getElementById("auth-item");
        const mainContainer = document.getElementById("main-container");

        // Lógica de apertura/cierre de submenús
        document.querySelectorAll(".arrow").forEach(arrow => {
            arrow.addEventListener("click", (e) => {
                let arrowParent = e.target.parentElement.parentElement;
                arrowParent.classList.toggle("showMenu");
            });
        });

        // Toggle del Sidebar (Responsivo)
        btnMenu.addEventListener("click", () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle("open-mobile");
            } else {
                sidebar.classList.toggle("close");
            }
        });

        window.login = () => {
            signInWithPopup(auth, provider).catch(error => console.error(error));
        };

        window.logout = () => {
            signOut(auth).then(() => location.reload());
        };

        window.cargarSeccion = (seccion) => {
            mainContainer.innerHTML = '<div class="loading-screen">Cargando...</div>';
            
            // Si estamos en móvil, cerramos el menú al elegir sección
            if (window.innerWidth <= 768) {
                sidebar.classList.remove("open-mobile");
            }

            if (seccion === 'home') {
                mainContainer.innerHTML = '<iframe src="home.html" style="width:100%; height:85vh; border:none;"></iframe>';
            } else if (seccion === 'chat') {
                mainContainer.innerHTML = '<iframe src="config.html" style="width:100%; height:85vh; border:none;"></iframe>';
            } else if (seccion === 'comunidad') {
                mainContainer.innerHTML = '<iframe src="comunity.html" style="width:100%; height:85vh; border:none;"></iframe>';
            } else if (seccion === 'contacto') {
                mainContainer.innerHTML = '<iframe src="contacto.html" style="width:100%; height:85vh; border:none;"></iframe>';
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authItem.innerHTML = `
                    <a onclick="logout()" style="cursor:pointer;">
                        <img src="${user.photoURL}" style="width:30px; border-radius:50%; margin: 0 24px;">
                        <span class="link_name">Cerrar Sesión</span>
                    </a>
                `;
                cargarSeccion('home');
            } else {
                authItem.innerHTML = `
                    <a onclick="login()" style="cursor:pointer;">
                        <i class="fa-brands fa-google"></i>
                        <span class="link_name">Entrar con Google</span>
                    </a>
                `;
                mainContainer.innerHTML = `
                    <div style="text-align:center; padding-top: 50px;">
                        <h1>Bienvenido a Interactive With You</h1>
                        <p>Iniciá sesión para empezar a configurar tus herramientas.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
