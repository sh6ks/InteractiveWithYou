<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InteractiveWithYou - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            font-size: 1.2rem;
            color: #a970ff;
        }
        /* Ajuste para que el submenú no se pise con otros elementos */
        .nav-links li.showMenu .sub-menu {
            display: block;
        }
    </style>
</head>
<body>

    <nav class="sidebar close" id="sidebar">
        <div class="logo-details">
            <i class="fa-solid fa-ghost"></i>
            <span class="logo_name">Interactive
                With 
                You</span>
        </div>
        
        <ul class="nav-links">
            <li>
                <a href="#" onclick="cargarSeccion('home')">
                    <i class="fa-solid fa-house"></i>
                    <span class="link_name">Inicio</span>
                </a>
            </li>
                <li class="menu-item-dropdown">
                    <div class="iocn-link" style="cursor:pointer;">
                        <a>
                            <i class="fa-solid fa-layer-group"></i>
                            <span class="link_name">Funciones</span>
                        </a>
                        <i class="fa-solid fa-chevron-down arrow"></i>
                    </div>
                    <div class="sub-menu">
                        <div class="sub-menu-content">
                            <ul>
                                <li><a href="#" onclick="cargarSeccion('chat')">Widget de Chat</a></li>
                            </ul>
                        </div>
                    </div>
                </li>
            <li>
                <a href="#" onclick="cargarSeccion('comunidad')">
                    <i class="fa-solid fa-comments"></i>
                    <span class="link_name">Comunidad</span>
                </a>
            </li>
            <li>
                <a href="#" onclick="cargarSeccion('contacto')">
                    <i class="fa-solid fa-address-book"></i>
                    <span class="link_name">Contacto</span>
                </a>
            </li>

            <li id="auth-sidebar-item" style="cursor:pointer;">
                </li>
        </ul>
    </nav>

    <section class="home-section">
        <div class="home-content">
            <i class="fa-solid fa-bars" id="btn-menu" style="cursor:pointer;"></i>
            <span class="text" id="section-title">Panel Principal</span>
        </div>
        
        <div id="main-container" class="container" style="padding: 20px;">
            <div class="loading-screen">Cargando plataforma...</div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
            authDomain: "interactivewithyou.firebaseapp.com",
            projectId: "interactivewithyou",
            storageBucket: "interactivewithyou.firebasestorage.app",
            messagingSenderId: "220446228684",
            appId: "1:220446228684:web:759044ab4365962d300269"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.login = () => signInWithPopup(auth, provider).catch(console.error);
        window.logout = () => signOut(auth);

        const sidebar = document.querySelector(".sidebar");
        const authItem = document.getElementById('auth-sidebar-item');
        const mainContainer = document.getElementById('main-container');

        // --- 1. ABRIR/CERRAR CON EL MOUSE (HOVER) ---
        sidebar.addEventListener("mouseenter", () => {
            sidebar.classList.remove("close");
        });

        sidebar.addEventListener("mouseleave", () => {
            sidebar.classList.add("close");
        });

        // --- 2. ABRIR/CERRAR SUBMENÚ CON CLICK ---
        const dropdownBtn = document.querySelector(".menu-item-dropdown");
        dropdownBtn.addEventListener("click", (e) => {
            dropdownBtn.classList.toggle("showMenu");
        });

        window.cargarSeccion = (seccion) => {
    const user = auth.currentUser;
    const container = document.getElementById('main-container');
    const title = document.getElementById('section-title');

    if (!user && seccion !== 'contacto') {
        container.innerHTML = '<h2 style="color:white; text-align:center;">Iniciá sesión para continuar.</h2>';
        return;
    }

    // Ahora agregamos "html/" porque los archivos están en esa carpeta
    if (seccion === 'home') {
        title.innerText = "Panel Principal";
        container.innerHTML = '<iframe src="html/home.html" style="width:100%; height:80vh; border:none;"></iframe>';
    } 
    else if (seccion === 'funciones') {
        title.innerText = "Galería de Funciones";
        container.innerHTML = '<iframe src="html/functions.html" style="width:100%; height:85vh; border:none; border-radius:10px;"></iframe>';
    }
    else if (seccion === 'chat') {
        title.innerText = "Configuración de Chat";
        container.innerHTML = '<iframe src="html/config.html" style="width:100%; height:85vh; border:none; border-radius:10px;"></iframe>';
    } 
    else if (seccion === 'comunidad') {
        title.innerText = "Muro de la Comunidad";
        container.innerHTML = '<iframe src="html/comunity.html" style="width:100%; height:85vh; border:none; border-radius:10px;"></iframe>';
    } 
    else if (seccion === 'contacto') {
        title.innerText = "Contacto";
        container.innerHTML = '<iframe src="html/contacto.html" style="width:100%; height:80vh; border:none;"></iframe>';
    }
};

        // Reemplazá el onAuthStateChanged por este:
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Si hay usuario, mostramos su foto en el menú lateral
                authItem.innerHTML = `
                    <a onclick="logout()">
                        <img src="${user.photoURL}" style="width:30px; border-radius:50%; margin: 0 24px;">
                        <span class="link_name">Cerrar Sesión</span>
                    </a>
                `;
                // Cargamos la página de inicio automáticamente
                cargarSeccion('home');
            } else {
                // Si no hay usuario, mostramos el botón de Google
                authItem.innerHTML = `
                    <a onclick="login()">
                        <i class="fa-brands fa-google"></i>
                        <span class="link_name">Entrar con Google</span>
                    </a>
                `;
                // Pantalla de bienvenida para usuarios no logueados
                mainContainer.innerHTML = `
                    <div style="text-align:center; padding-top: 50px;">
                        <h1>Bienvenido a Interactive With You</h1>
                        <p>Por favor, iniciá sesión para configurar tus widgets de stream.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
