<!DOCTYPE html>
<html lang="es">
<!--
  widget.html
  Interfaz embebida del widget de chat que se conecta al canal de Twitch.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InteractiveWithYou - Widget</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
</head>
<body>
    <div id="widget-shell">
        <div class="widget-header">
            <div>
                <span class="widget-title">Chat de Twitch</span>
                <span class="widget-note">Vista previa y mensajes reales</span>
            </div>
            <span id="chat-status" class="chat-status">Cargando preview...</span>
        </div>
        <div id="chat"></div>
    </div>

    <script type="module">
        // Script del widget: carga configuración desde Firestore y se conecta al chat de Twitch.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
            authDomain: "interactivewithyou.firebaseapp.com",
            projectId: "interactivewithyou",
            storageBucket: "interactivewithyou.firebasestorage.app",
            messagingSenderId: "220446228684",
            appId: "1:220446228684:web:759044ab4365962d300269"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const canalSolicitado = urlParams.get('canal')?.toLowerCase();

        // Inicializa la configuración del widget y carga la fuente antes de conectar.
        async function iniciarWidget() {
            if (!canalSolicitado) {
                console.error("No se especificó un canal en la URL.");
                return;
            }

            const q = query(collection(db, "usuarios"), where("canal", "==", canalSolicitado));
            const querySnapshot = await getDocs(q);
            
            let config = { color: "#6441a5", fuente: "Roboto", animacionDireccion: 'from-left', animacionEstilo: 'slide' };

            querySnapshot.forEach((doc) => {
                config = { ...config, ...doc.data() };
            });

            // Cargamos la fuente y RECIÉN AHÍ conectamos al chat
            WebFont.load({
                google: {
                    families: [config.fuente]
                },
                active: function() {
                    console.log("Fuente cargada con éxito:", config.fuente);
                    document.body.style.fontFamily = config.fuente;
                    conectarTwitch(canalSolicitado, config.color);
                },
                inactive: function() {
                    console.log("No se pudo cargar la fuente, usando fallback.");
                    document.body.style.fontFamily = "sans-serif";
                    conectarTwitch(canalSolicitado, config.color);
                }
            }); // <-- Aquí cerramos WebFont correctamente
        }

        const previewSamples = [
            { usuario: 'StreamBot', mensaje: '¡Bienvenidos al live!', color: '#55c2ff' },
            { usuario: 'Gamer123', mensaje: '¿Listos para el desafío?', color: '#ffbe59' },
            { usuario: 'ViewerGirl', mensaje: 'Me encanta ese overlay ✨', color: '#62ff8a' },
            { usuario: 'Mod', mensaje: 'No olviden seguir y activar campana.', color: '#ff7b9a' }
        ];

        const statusElement = document.getElementById('chat-status');
        let firstRealMessage = true;

        function mostrarEjemplos(texto) {
            const contenedor = document.getElementById('chat');
            const now = Date.now();
            contenedor.innerHTML = '';
            statusElement.innerText = texto;

            previewSamples.forEach((item, index) => {
                const div = document.createElement('div');
                const effect = ['from-top', 'from-bottom', 'from-left'][index % 3];
                div.className = `mensaje ${effect} ejemplo`;
                div.style.borderLeft = `5px solid ${item.color}`;
                div.innerHTML = `<span style="color:${item.color}; font-weight:bold;">${item.usuario}:</span> ${item.mensaje}`;
                contenedor.appendChild(div);
                setTimeout(() => {
                    if (div.parentElement) div.remove();
                }, 9000 + index * 700);
            });
        }

        // Conecta al chat de Twitch vía WebSocket para recibir mensajes en vivo.
        function conectarTwitch(canal, colorBorde) {
            const socket = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
            socket.onopen = () => {
                socket.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
                socket.send('PASS oauth:mypassword');
                socket.send('NICK justinfan' + Math.floor(Math.random() * 10000));
                socket.send('JOIN #' + canal);
                console.log("Conectado al chat de:", canal);
                statusElement.innerText = `Conectado a #${canal}`;
            };

            socket.onmessage = (event) => {
                const data = event.data;
                if (data.includes('PRIVMSG')) {
                    if (firstRealMessage) {
                        document.querySelectorAll('.ejemplo').forEach(el => el.remove());
                        firstRealMessage = false;
                    }
                    const usuario = data.split('display-name=')[1].split(';')[0];
                    const colorTwitch = data.split('color=')[1].split(';')[0] || colorBorde;
                    const mensajeRaw = data.split(`PRIVMSG #${canal} :`)[1];
                    const contenedor = document.getElementById('chat');
                    const div = document.createElement('div');
                    const direction = config.animacionDireccion || ['from-top', 'from-bottom', 'from-left', 'from-right'][Math.floor(Math.random() * 4)];
                    const estilo = config.animacionEstilo || 'slide';
                    div.className = `mensaje ${direction} ${estilo}`;
                    div.style.borderLeft = `5px solid ${colorBorde}`;
                    div.innerHTML = `<span style="color:${colorTwitch}; font-weight:bold;">${usuario}:</span> ${mensajeRaw}`;
                    contenedor.appendChild(div);
                    setTimeout(() => div.remove(), 10000);
                }
                if (data.startsWith('PING')) socket.send('PONG');
            };
        }

        if (!canalSolicitado) {
            mostrarEjemplos('Vista previa del widget. Agrega ?canal=tuCanal');
        } else {
            mostrarEjemplos(`Conectando al chat de ${canalSolicitado}...`);
            iniciarWidget();
        }
        
    </script>
</body>
</html>
