<!DOCTYPE html>
<html lang="es">
<!--
  widget.html
  Interfaz embebida del widget de chat que se conecta al canal de Twitch.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InteractiveWithYou - Widget</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
</head>
<body>
    <div id="widget-shell">
        <div id="chat"></div>
    </div>

    <script type="module">
        // Script del widget: carga configuración desde Firestore y se conecta al chat de Twitch.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
            authDomain: "interactivewithyou.firebaseapp.com",
            projectId: "interactivewithyou",
            storageBucket: "interactivewithyou.firebasestorage.app",
            messagingSenderId: "220446228684",
            appId: "1:220446228684:web:759044ab4365962d300269"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const canalSolicitado = urlParams.get('canal')?.toLowerCase();

        // Inicializa la configuración del widget y carga la fuente antes de conectar.
        async function iniciarWidget() {
            if (!canalSolicitado) {
                console.error("No se especificó un canal en la URL.");
                setStatus('Falta parámetro canal en la URL', 'error');
                return;
            }

            setStatus(`Buscando configuración para #${canalSolicitado}...`, 'info');

            try {
                const q = query(collection(db, "usuarios"), where("canal", "==", canalSolicitado));
                const querySnapshot = await getDocs(q);

                let config = { color: "#6441a5", grosorBorde: 5, colorRecuadro: '#000000', opacidadRecuadro: 88, fuente: "Roboto", animacionDireccion: 'from-left', animacionEstilo: 'slide', disenoMensaje: 'design-solid', customCssMode: 'url', customCssUrl: '', customCssContent: '' };

                // Prioriza el documento por ID de canal para evitar tomar configs viejas.
                const canalDocRef = doc(db, 'usuarios', canalSolicitado);
                const canalDocSnap = await getDoc(canalDocRef);
                if (canalDocSnap.exists()) {
                    config = { ...config, ...canalDocSnap.data() };
                } else {
                    const docs = [];
                    querySnapshot.forEach((snap) => docs.push(snap.data()));
                    if (docs.length > 0) {
                        docs.sort((a, b) => {
                            const ta = a.ultima_actualizacion?.seconds || 0;
                            const tb = b.ultima_actualizacion?.seconds || 0;
                            return tb - ta;
                        });
                        config = { ...config, ...docs[0] };
                    }
                }

                if (querySnapshot.empty) {
                    console.warn('No se encontró configuración para', canalSolicitado);
                    setStatus(`Sin config personalizada para #${canalSolicitado}, usando valores por defecto`, 'warning');
                }

                let twitchClientId = config.twitchClientId || urlParams.get('client_id');
                let twitchAccessToken = config.twitchAccessToken || urlParams.get('access_token');
                const twitchTokenEndpoint = config.twitchTokenEndpoint || urlParams.get('token_endpoint');

                // If token is missing in frontend config, request a short-lived token from backend.
                if ((!twitchClientId || !twitchAccessToken) && twitchTokenEndpoint) {
                    try {
                        const tokenResponse = await fetch(twitchTokenEndpoint);
                        const tokenJson = await tokenResponse.json();
                        if (tokenResponse.ok && tokenJson?.access_token) {
                            twitchAccessToken = tokenJson.access_token;
                            twitchClientId = twitchClientId || tokenJson.client_id || null;
                        } else {
                            console.warn('No se pudo obtener token desde backend:', tokenJson);
                        }
                    } catch (tokenErr) {
                        console.warn('Error consultando endpoint de token Twitch:', tokenErr);
                    }
                }

                let twitchAssets = null;
                if (twitchClientId && twitchAccessToken) {
                    try {
                        twitchAssets = await fetchTwitchChannelAssets(canalSolicitado, twitchClientId, twitchAccessToken);
                    } catch (err) {
                        console.warn('No se pudieron cargar assets de Twitch API:', err);
                    }
                }

                const legacyThirdPartyEnabled = config.enableThirdPartyEmotes !== false;
                const emoteProviders = {
                    sevenTv: config.enable7tvEmotes ?? legacyThirdPartyEnabled,
                    bttv: config.enableBttvEmotes ?? legacyThirdPartyEnabled,
                    ffz: config.enableFfzEmotes ?? legacyThirdPartyEnabled
                };

                let thirdPartyEmotes = {};
                if (emoteProviders.sevenTv || emoteProviders.bttv || emoteProviders.ffz) {
                    try {
                        thirdPartyEmotes = await fetchThirdPartyEmotes(canalSolicitado, twitchAssets?.userId, emoteProviders);
                    } catch (err) {
                        console.warn('No se pudieron cargar emotes de terceros:', err);
                    }
                }

                if (config.disenoMensaje === 'design-custom') {
                    applyCustomWidgetCss(config.customCssMode, config.customCssUrl, config.customCssContent);
                }

                // Cargamos la fuente y RECIÉN AHÍ conectamos al chat
                WebFont.load({
                    google: {
                        families: [config.fuente]
                    },
                    active: function() {
                        console.log("Fuente cargada con éxito:", config.fuente);
                        document.body.style.fontFamily = config.fuente;
                        conectarTwitch(
                            canalSolicitado,
                            config.color,
                            config.animacionDireccion,
                            config.animacionEstilo,
                            config.disenoMensaje,
                            config.colorRecuadro,
                            config.opacidadRecuadro,
                            config.grosorBorde,
                            twitchAssets,
                            thirdPartyEmotes,
                            config.chatCommands || [],
                            config.chatTimers || [],
                            Boolean(config.sendToTwitchChat)
                        );
                    },
                    inactive: function() {
                        console.log("No se pudo cargar la fuente, usando fallback.");
                        document.body.style.fontFamily = "sans-serif";
                        conectarTwitch(
                            canalSolicitado,
                            config.color,
                            config.animacionDireccion,
                            config.animacionEstilo,
                            config.disenoMensaje,
                            config.colorRecuadro,
                            config.opacidadRecuadro,
                            config.grosorBorde,
                            twitchAssets,
                            thirdPartyEmotes,
                            config.chatCommands || [],
                            config.chatTimers || [],
                            Boolean(config.sendToTwitchChat)
                        );
                    }
                });
            } catch (error) {
                console.error('Error cargando configuración:', error);
                setStatus('No se pudo cargar la configuración del widget', 'error');
                mostrarEjemplos('Revisa la consola para más detalles.');
            }
        }

        const previewSamples = [
            { usuario: 'StreamBot', mensaje: '¡Bienvenidos al live!', color: '#55c2ff' },
            { usuario: 'Gamer123', mensaje: '¿Listos para el desafío?', color: '#ffbe59' },
            { usuario: 'ViewerGirl', mensaje: 'Me encanta ese overlay ✨', color: '#62ff8a' },
            { usuario: 'Mod', mensaje: 'No olviden seguir y activar campana.', color: '#ff7b9a' }
        ];

        let firstRealMessage = true;
        let timerHandles = [];
        const CHAT_RELAY_ENDPOINT = urlParams.get('relay_endpoint') || 'https://us-central1-interactivewithyou.cloudfunctions.net/relayTwitchChatMessage';
        const COMMAND_AUDIT_ENDPOINT = urlParams.get('command_audit_endpoint') || 'https://us-central1-interactivewithyou.cloudfunctions.net/logTwitchCommandExecution';

        function setStatus() {
            // Placeholder para mantener compatibilidad con el código anterior.
        }

        function clearChatTimers() {
            timerHandles.forEach((handle) => clearInterval(handle));
            timerHandles = [];
        }

        function getTwitchHeaders(clientId, token) {
            return {
                'Client-ID': clientId,
                'Authorization': `Bearer ${token}`
            };
        }

        async function fetchTwitchChannelAssets(canal, clientId, token) {
            const headers = getTwitchHeaders(clientId, token);
            const userResponse = await fetch(`https://api.twitch.tv/helix/users?login=${encodeURIComponent(canal)}`, { headers });
            if (!userResponse.ok) {
                throw new Error(`Error al obtener usuario Twitch: ${userResponse.status}`);
            }
            const userData = await userResponse.json();
            const user = userData.data?.[0];
            if (!user) {
                throw new Error('Usuario Twitch no encontrado');
            }

            const badgeResponse = await fetch(`https://api.twitch.tv/helix/chat/badges?broadcaster_id=${user.id}`, { headers });
            if (!badgeResponse.ok) {
                throw new Error(`Error al obtener badges Twitch: ${badgeResponse.status}`);
            }
            const badgeData = await badgeResponse.json();
            const badgeSets = {};
            function indexVersions(sets) {
                sets?.forEach(set => {
                    const versions = {};
                    (set.versions || []).forEach(v => { versions[v.id] = v; });
                    badgeSets[set.set_id] = versions;
                });
            }

            // Global badges como fallback
            const globalBadgeResponse = await fetch('https://api.twitch.tv/helix/chat/badges/global', { headers });
            if (globalBadgeResponse.ok) {
                const globalData = await globalBadgeResponse.json();
                indexVersions(globalData.data);
            }
            // Channel badges sobreescriben los globales
            indexVersions(badgeData.data);

            return {
                userId: user.id,
                profileImageUrl: user.profile_image_url,
                displayName: user.display_name,
                badgeSets
            };
        }

        function isBotUser(login) {
            const normalized = (login || '').toLowerCase();
            const botNames = [
                'nightbot', 'moobot', 'streamelements', 'streamlabs', 'deepbot', 'phantombot',
                'ankhbot', 'wizebot', 'bouncer', 'streamlabsbot', 'nightbottt', 'moobottt'
            ];
            return botNames.includes(normalized) || normalized.endsWith('bot');
        }

        function buildChannelAvatar(twitchAssets) {
            if (!twitchAssets?.profileImageUrl) return '';
            return `<span class="message-avatar"><img src="${twitchAssets.profileImageUrl}" alt="Channel avatar" loading="lazy"></span>`;
        }

        function buildBadgeIcons(tags, badgeSets) {
            const badgeString = tags['badges'] || tags['badge-info'] || tags['badges-raw'] || '';
            if (!badgeString) return '';

            return badgeString.split(',').map(entry => {
                const [key, version] = entry.split('/');
                const badgeVersion = badgeSets?.[key]?.[version];
                if (badgeVersion && badgeVersion.image_url_1x) {
                    return `<span class="badge-icon badge-${key}" title="${key} ${version}"><img src="${badgeVersion.image_url_1x}" alt="${key}" loading="lazy"></span>`;
                }
                const badgeMap = {
                    broadcaster: '📣',
                    moderator: '🛡️',
                    vip: '💎',
                    subscriber: 'SUB',
                    founder: '👑',
                    premium: '💎',
                    staff: '🏳️',
                    admin: '🧑‍💼',
                    global_mod: '🌍',
                    turbo: '⚡',
                    bits: '✨'
                };
                const icon = badgeMap[key] || '🔰';
                return `<span class="badge-icon badge-${key}" title="${key}${version ? ` ${version}` : ''}">${icon}</span>`;
            }).join(' ');
        }

        function escapeHtml(text) {
            return (text || '').replace(/[&<>"']/g, (char) => {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                };
                return map[char] || char;
            });
        }

        function decodeIrcTagValue(value) {
            return (value || '')
                .replace(/\\s/g, ' ')
                .replace(/\\:/g, ';')
                .replace(/\\r/g, '\r')
                .replace(/\\n/g, '\n')
                .replace(/\\\\/g, '\\');
        }

        function normalizeEmoteUrl(url) {
            if (!url) return '';
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            if (url.startsWith('//')) return `https:${url}`;
            return `https://${url.replace(/^\/+/, '')}`;
        }

        function select7tvFile(files = []) {
            if (!Array.isArray(files) || files.length === 0) return null;
            return files.find(file => file.name === '1x.webp')
                || files.find(file => file.name === '2x.webp')
                || files.find(file => file.name?.endsWith('.webp'))
                || files[0];
        }

        function parse7tvEmoteSet(emoteSet) {
            const map = {};
            if (!emoteSet?.emotes) return map;

            emoteSet.emotes.forEach((emote) => {
                const file = select7tvFile(emote?.data?.host?.files || []);
                if (!file?.name || !emote?.data?.host?.url || !emote?.name) return;
                const url = normalizeEmoteUrl(`${emote.data.host.url}/${file.name}`);
                if (!url) return;
                map[emote.name] = url;
            });
            return map;
        }

        function parseBttvList(list = []) {
            const map = {};
            if (!Array.isArray(list)) return map;

            list.forEach((emote) => {
                if (!emote?.code || !emote?.id) return;
                map[emote.code] = `https://cdn.betterttv.net/emote/${emote.id}/1x`;
            });
            return map;
        }

        function parseFfzSets(sets) {
            const map = {};
            if (!sets || typeof sets !== 'object') return map;

            Object.values(sets).forEach((set) => {
                (set?.emoticons || []).forEach((emote) => {
                    if (!emote?.name || !emote?.urls) return;
                    const emoteUrl = emote.urls['1'] || emote.urls['2'] || emote.urls['4'];
                    const normalizedUrl = normalizeEmoteUrl(emoteUrl);
                    if (!normalizedUrl) return;
                    map[emote.name] = normalizedUrl;
                });
            });

            return map;
        }

        async function fetchThirdPartyEmotes(canal, twitchUserId, providers = {}) {
            const emoteMap = {};
            const merge = (entries) => {
                Object.entries(entries || {}).forEach(([code, url]) => {
                    if (!code || !url) return;
                    emoteMap[code] = url;
                });
            };

            const use7tv = providers.sevenTv !== false;
            const useBttv = providers.bttv !== false;
            const useFfz = providers.ffz !== false;

            // Cargamos globales primero y luego los del canal para que sobrescriban si hay nombre repetido.
            const tasks = [];

            if (use7tv) {
                tasks.push(
                    fetch('https://7tv.io/v3/emote-sets/global').then(r => r.ok ? r.json() : null).then(data => merge(parse7tvEmoteSet(data))).catch(() => null)
                );
            }

            if (useBttv) {
                tasks.push(
                    fetch('https://api.betterttv.net/3/cached/emotes/global').then(r => r.ok ? r.json() : null).then(data => merge(parseBttvList(data))).catch(() => null)
                );
            }

            if (useFfz) {
                tasks.push(
                    fetch('https://api.frankerfacez.com/v1/set/global').then(r => r.ok ? r.json() : null).then(data => merge(parseFfzSets(data?.sets))).catch(() => null)
                );
            }

            if (twitchUserId) {
                if (use7tv) {
                    tasks.push(
                        fetch(`https://7tv.io/v3/users/twitch/${encodeURIComponent(twitchUserId)}`).then(r => r.ok ? r.json() : null).then(data => merge(parse7tvEmoteSet(data?.emote_set))).catch(() => null)
                    );
                }

                if (useBttv) {
                    tasks.push(
                        fetch(`https://api.betterttv.net/3/cached/users/twitch/${encodeURIComponent(twitchUserId)}`).then(r => r.ok ? r.json() : null).then((data) => {
                            merge(parseBttvList(data?.channelEmotes || []));
                            merge(parseBttvList(data?.sharedEmotes || []));
                        }).catch(() => null)
                    );
                }
            }

            if (canal && useFfz) {
                tasks.push(
                    fetch(`https://api.frankerfacez.com/v1/room/${encodeURIComponent(canal)}`).then(r => r.ok ? r.json() : null).then(data => merge(parseFfzSets(data?.sets))).catch(() => null)
                );
            }

            await Promise.all(tasks);
            return emoteMap;
        }

        function parseTwitchEmotes(tagValue) {
            const emoteTag = decodeIrcTagValue(tagValue || '');
            if (!emoteTag) return [];

            const replacements = [];
            emoteTag.split('/').forEach((group) => {
                if (!group) return;
                const [emoteId, positions] = group.split(':');
                if (!emoteId || !positions) return;

                positions.split(',').forEach((position) => {
                    const [startRaw, endRaw] = position.split('-');
                    const start = Number(startRaw);
                    const end = Number(endRaw);
                    if (!Number.isInteger(start) || !Number.isInteger(end) || end < start) return;
                    replacements.push({
                        start,
                        end,
                        emoteId,
                        url: `https://static-cdn.jtvnw.net/emoticons/v2/${emoteId}/default/dark/1.0`
                    });
                });
            });

            return replacements.sort((a, b) => a.start - b.start);
        }

        function renderSegmentWithThirdPartyEmotes(text, thirdPartyEmotes) {
            if (!text) return '';
            const chunks = text.split(/(\s+)/);
            return chunks.map((chunk) => {
                if (!chunk || /^\s+$/.test(chunk)) return escapeHtml(chunk);
                const emoteUrl = thirdPartyEmotes?.[chunk];
                if (!emoteUrl) return escapeHtml(chunk);
                return `<img class="chat-emote chat-emote-third-party" src="${escapeHtml(emoteUrl)}" alt="${escapeHtml(chunk)}" title="${escapeHtml(chunk)}" loading="lazy">`;
            }).join('');
        }

        function renderMessageWithEmotes(message, tags, thirdPartyEmotes) {
            const twitchReplacements = parseTwitchEmotes(tags?.emotes || '');
            if (twitchReplacements.length === 0) {
                return renderSegmentWithThirdPartyEmotes(message, thirdPartyEmotes);
            }

            let html = '';
            let cursor = 0;
            twitchReplacements.forEach((item) => {
                if (item.start < cursor || item.start > message.length - 1) return;
                const plainText = message.slice(cursor, item.start);
                html += renderSegmentWithThirdPartyEmotes(plainText, thirdPartyEmotes);

                const rawToken = message.slice(item.start, item.end + 1);
                html += `<img class="chat-emote chat-emote-twitch" src="${escapeHtml(item.url)}" alt="${escapeHtml(rawToken)}" title="${escapeHtml(rawToken)}" loading="lazy">`;
                cursor = item.end + 1;
            });

            if (cursor < message.length) {
                html += renderSegmentWithThirdPartyEmotes(message.slice(cursor), thirdPartyEmotes);
            }

            return html;
        }

        function sanitizeChatCommands(list = []) {
            if (!Array.isArray(list)) return [];
            return list
                .map((item) => {
                    const rawTrigger = (item?.trigger || '').toString().trim().toLowerCase().replace(/\s+/g, '');
                    const trigger = rawTrigger ? (rawTrigger.startsWith('!') ? rawTrigger : `!${rawTrigger}`) : '';
                    return {
                        trigger,
                        response: (item?.response || '').toString().trim(),
                        permission: normalizeCommandPermission(item?.permission),
                        cooldownSeconds: Math.max(0, Math.min(600, Number(item?.cooldownSeconds || 0))),
                        enabled: item?.enabled !== false
                    };
                })
                .filter((item) => item.trigger && item.response && item.enabled)
                .slice(0, 30);
        }

        function normalizeCommandPermission(value) {
            const raw = String(value || '').trim().toLowerCase();
            if (raw === 'broadcaster') return 'owner';
            return ['everyone', 'subscriber', 'mod', 'owner'].includes(raw) ? raw : 'everyone';
        }

        function getRoleInfo(tags, login, canal) {
            const badgeRaw = decodeIrcTagValue(tags?.badges || '');
            const badges = badgeRaw ? badgeRaw.split(',') : [];
            const hasBadge = (name) => badges.some((entry) => entry.startsWith(`${name}/`));
            const isBroadcaster = hasBadge('broadcaster') || String(login || '').toLowerCase() === String(canal || '').toLowerCase();
            const isMod = isBroadcaster || hasBadge('moderator');
            const isSubscriber = isMod || hasBadge('subscriber') || hasBadge('founder');
            return { isBroadcaster, isMod, isSubscriber };
        }

        function hasPermissionForCommand(command, roleInfo) {
            const permission = command?.permission || 'everyone';
            if (permission === 'owner') return roleInfo.isBroadcaster;
            if (permission === 'mod') return roleInfo.isMod;
            if (permission === 'subscriber') return roleInfo.isSubscriber;
            return true;
        }

        async function logCommandAudit(channel, command, login, displayName, permission, outcome) {
            const payload = {
                channel,
                trigger: command,
                userLogin: login,
                userDisplayName: displayName,
                permission,
                outcome,
                source: 'widget'
            };

            try {
                await fetch(COMMAND_AUDIT_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                console.warn('No se pudo registrar auditoria de comando:', error);
            }
        }

        function sanitizeChatTimers(list = []) {
            if (!Array.isArray(list)) return [];
            return list
                .map((item) => ({
                    message: (item?.message || '').toString().trim(),
                    minutes: Math.max(1, Math.min(120, Number(item?.minutes || 5))),
                    enabled: item?.enabled !== false
                }))
                .filter((item) => item.message && item.enabled)
                .slice(0, 20);
        }

        function createBotMessageElement(botName, message, colorBorde, disenoMensaje, colorRecuadro, opacidadRecuadro, grosorBorde, thirdPartyEmotes) {
            const div = document.createElement('div');
            div.className = `mensaje from-left slide ${disenoMensaje}`;
            const borderSize = Math.max(2, Math.min(12, Number(grosorBorde) || 5));
            div.style.borderLeft = `${borderSize}px solid ${colorBorde}`;
            div.style.setProperty('--accent-color', colorBorde);
            const rgb = hexToRgb(colorBorde);
            div.style.setProperty('--accent-rgb', `${rgb.r}, ${rgb.g}, ${rgb.b}`);
            if (disenoMensaje === 'design-solid' || disenoMensaje === 'design-square') {
                div.style.backgroundColor = hexToRgba(colorRecuadro || '#000000', (Number(opacidadRecuadro) || 88) / 100);
            }

            const fakeTags = {};
            const messageHtml = renderMessageWithEmotes(message, fakeTags, thirdPartyEmotes);
            div.innerHTML = `<span style="color:${colorBorde}; font-weight:bold;">${escapeHtml(botName)}:</span> ${messageHtml}`;
            return div;
        }

        function emitBotMessage(botName, message, colorBorde, disenoMensaje, colorRecuadro, opacidadRecuadro, grosorBorde, thirdPartyEmotes) {
            const contenedor = document.getElementById('chat');
            if (!contenedor || !message) return;
            const div = createBotMessageElement(botName, message, colorBorde, disenoMensaje, colorRecuadro, opacidadRecuadro, grosorBorde, thirdPartyEmotes);
            contenedor.appendChild(div);
            setTimeout(() => {
                if (div.parentElement) div.remove();
            }, 10000);
        }

        async function sendToTwitchChat(canal, message, relayEnabled) {
            if (!relayEnabled) return;
            const content = (message || '').replace(/\r|\n/g, ' ').trim();
            if (!content) return;
            try {
                await fetch(CHAT_RELAY_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel: canal, message: content })
                });
            } catch (error) {
                console.warn('No se pudo enviar mensaje al chat real por relay:', error);
            }
        }

        function startChatTimers(botName, timers, colorBorde, disenoMensaje, colorRecuadro, opacidadRecuadro, grosorBorde, thirdPartyEmotes, canal, relayEnabled) {
            clearChatTimers();
            timers.forEach((timer) => {
                const intervalMs = Math.max(1, Math.min(120, Number(timer.minutes || 5))) * 60 * 1000;
                const handle = setInterval(() => {
                    emitBotMessage(botName, timer.message, colorBorde, disenoMensaje, colorRecuadro, opacidadRecuadro, grosorBorde, thirdPartyEmotes);
                    sendToTwitchChat(canal, timer.message, relayEnabled);
                }, intervalMs);
                timerHandles.push(handle);
            });
        }

        function hexToRgb(hex) {
            const value = (hex || '').replace('#', '');
            const normalized = value.length === 3 ? value.split('').map(c => c + c).join('') : value;
            const num = parseInt(normalized, 16);
            if (Number.isNaN(num)) return { r: 145, g: 71, b: 255 };
            return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
        }

        function hexToRgba(hex, alpha) {
            const rgb = hexToRgb(hex);
            const a = Math.max(0, Math.min(1, alpha));
            return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${a})`;
        }

        let customWidgetStyleTag = null;
        let customWidgetLinkTag = null;

        function removeCustomWidgetCss() {
            if (customWidgetStyleTag) {
                customWidgetStyleTag.remove();
                customWidgetStyleTag = null;
            }
            if (customWidgetLinkTag) {
                customWidgetLinkTag.remove();
                customWidgetLinkTag = null;
            }
        }

        function isSafeCustomCssUrl(url) {
            try {
                const parsed = new URL(url);
                return parsed.protocol === 'https:' || parsed.protocol === 'http:';
            } catch {
                return false;
            }
        }

        function validateCustomCssText(cssText) {
            const content = (cssText || '').toLowerCase();
            const forbidden = [
                /@import\b/,
                /\bhtml\b\s*\{/,
                /\bbody\b\s*\{/,
                /:root\s*\{/,
                /(^|\n)\s*\*\s*\{/
            ];
            return !forbidden.some((pattern) => pattern.test(content));
        }

        function applyCustomWidgetCss(mode = 'url', cssUrl = '', cssContent = '') {
            removeCustomWidgetCss();
            if (mode === 'url') {
                const url = (cssUrl || '').trim();
                if (!url || !isSafeCustomCssUrl(url)) return;
                customWidgetLinkTag = document.createElement('link');
                customWidgetLinkTag.rel = 'stylesheet';
                customWidgetLinkTag.href = url;
                customWidgetLinkTag.setAttribute('data-widget-custom-css', 'true');
                document.head.appendChild(customWidgetLinkTag);
                return;
            }

            const content = (cssContent || '').trim();
            if (!content || !validateCustomCssText(content)) return;
            customWidgetStyleTag = document.createElement('style');
            customWidgetStyleTag.setAttribute('data-widget-custom-css', 'true');
            customWidgetStyleTag.textContent = content;
            document.head.appendChild(customWidgetStyleTag);
        }

        function mostrarEjemplos(texto) {
            const contenedor = document.getElementById('chat');
            contenedor.innerHTML = '';

            previewSamples.forEach((item, index) => {
                const div = document.createElement('div');
                const effect = ['from-top', 'from-bottom', 'from-left'][index % 3];
                div.className = `mensaje ${effect} ejemplo`;
                div.style.borderLeft = `5px solid ${item.color}`;
                div.innerHTML = `<span style="color:${item.color}; font-weight:bold;">${item.usuario}:</span> ${item.mensaje}`;
                contenedor.appendChild(div);
                setTimeout(() => {
                    if (div.parentElement) div.remove();
                }, 9000 + index * 700);
            });
        }

        // Conecta al chat de Twitch vía WebSocket para recibir mensajes en vivo.
        function conectarTwitch(canal, colorBorde, animacionDireccion = 'from-left', animacionEstilo = 'slide', disenoMensaje = 'design-solid', colorRecuadro = '#000000', opacidadRecuadro = 88, grosorBorde = 5, twitchAssets = null, thirdPartyEmotes = {}, chatCommands = [], chatTimers = [], sendToTwitchChatEnabled = false) {
            setStatus(`Conectando al chat de #${canal}...`, 'info');
            const normalizedCommands = sanitizeChatCommands(chatCommands);
            const normalizedTimers = sanitizeChatTimers(chatTimers);
            const commandCooldownMap = new Map();
            const botName = 'IWY Bot';
            const socket = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
            const relayEnabled = Boolean(sendToTwitchChatEnabled);

            socket.addEventListener('open', () => {
                socket.send('CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership');
                socket.send('PASS oauth:anonymous');
                socket.send('NICK justinfan' + Math.floor(Math.random() * 10000));
                socket.send('JOIN #' + canal);
                console.log('Socket abierto y JOIN enviado para', canal);
                setStatus(`Conectado a #${canal}`, 'info');
                startChatTimers(botName, normalizedTimers, colorBorde, disenoMensaje, colorRecuadro, opacidadRecuadro, grosorBorde, thirdPartyEmotes, canal, relayEnabled);
            });

            socket.addEventListener('message', (event) => {
                const data = event.data;
                console.debug('Twitch IRC chunk:', data);

                const lines = data.split(/\r?\n/).filter(line => line.trim().length > 0);
                lines.forEach((line) => {
                    console.debug('Twitch IRC line:', line);

                    if (line.startsWith('PING')) {
                        socket.send(line.replace('PING', 'PONG'));
                        console.debug('Respondido PONG');
                        return;
                    }

                    const messageMatch = line.match(/^(?:@([^ ]+) )?:([^ ]+) PRIVMSG #([^ ]+) :(.*)$/);
                    if (!messageMatch) return;

                    // Solo mostrar mensajes del canal propio, ignorar otros (streams compartidos)
                    const canalDelMensaje = messageMatch[3].toLowerCase();
                    if (canalDelMensaje !== canal.toLowerCase()) return;

                    if (firstRealMessage) {
                        document.querySelectorAll('.ejemplo').forEach(el => el.remove());
                        firstRealMessage = false;
                        setStatus(`Recibiendo chat real de #${canal}`, 'info');
                    }

                    const rawTags = messageMatch[1] || '';
                    const userPrefix = messageMatch[2] || '';
                    const mensajeRaw = messageMatch[4] || '';

                    const tags = rawTags.split(';').reduce((acc, part) => {
                        const [key, value] = part.split('=');
                        if (key) acc[key] = value || '';
                        return acc;
                    }, {});

                    const login = tags['login'] || userPrefix.split('!')[0] || 'anon';
                    if (isBotUser(login)) return;

                    const usuario = decodeIrcTagValue(tags['display-name']) || login;
                    const colorTwitch = tags['color'] || colorBorde;
                    const mensajeHtml = renderMessageWithEmotes(mensajeRaw, tags, thirdPartyEmotes);
                    const avatarHtml = buildChannelAvatar(twitchAssets);
                    const badgesHtml = buildBadgeIcons(tags, twitchAssets?.badgeSets);
                    const contenedor = document.getElementById('chat');
                    const div = document.createElement('div');
                    const direction = animacionDireccion || ['from-top', 'from-bottom', 'from-left', 'from-right'][Math.floor(Math.random() * 4)];
                    const estilo = animacionEstilo || 'slide';
                    div.className = `mensaje ${direction} ${estilo} ${disenoMensaje}`;
                    const borderSize = Math.max(2, Math.min(12, Number(grosorBorde) || 5));
                    div.style.borderLeft = `${borderSize}px solid ${colorBorde}`;
                    div.style.setProperty('--accent-color', colorBorde);
                    const rgb = hexToRgb(colorBorde);
                    div.style.setProperty('--accent-rgb', `${rgb.r}, ${rgb.g}, ${rgb.b}`);
                    if (disenoMensaje === 'design-solid' || disenoMensaje === 'design-square') {
                        div.style.backgroundColor = hexToRgba(colorRecuadro || '#000000', (Number(opacidadRecuadro) || 88) / 100);
                    }
                    div.innerHTML = `${avatarHtml}${badgesHtml}<span style="color:${colorTwitch}; font-weight:bold;"> ${escapeHtml(usuario)}:</span> ${mensajeHtml}`;
                    contenedor.appendChild(div);
                    setTimeout(() => div.remove(), 10000);

                    const firstToken = (mensajeRaw.trim().split(/\s+/)[0] || '').toLowerCase();
                    const matchedCommand = normalizedCommands.find((item) => item.trigger === firstToken);
                    if (matchedCommand) {
                        const roleInfo = getRoleInfo(tags, login, canal);
                        const permissionOk = hasPermissionForCommand(matchedCommand, roleInfo);
                        if (!permissionOk) {
                            logCommandAudit(canal, matchedCommand.trigger, login, usuario, matchedCommand.permission, 'denied_permission');
                            return;
                        }

                        const cooldownMs = Math.max(0, Number(matchedCommand.cooldownSeconds || 0)) * 1000;
                        if (cooldownMs > 0) {
                            const lastExec = commandCooldownMap.get(matchedCommand.trigger) || 0;
                            const now = Date.now();
                            if (now - lastExec < cooldownMs) {
                                logCommandAudit(canal, matchedCommand.trigger, login, usuario, matchedCommand.permission, 'cooldown');
                                return;
                            }
                            commandCooldownMap.set(matchedCommand.trigger, now);
                        }

                        emitBotMessage(botName, matchedCommand.response, colorBorde, disenoMensaje, colorRecuadro, opacidadRecuadro, grosorBorde, thirdPartyEmotes);
                        sendToTwitchChat(canal, matchedCommand.response, relayEnabled);
                        logCommandAudit(canal, matchedCommand.trigger, login, usuario, matchedCommand.permission, 'executed');
                    }
                });
            });

            socket.addEventListener('error', (err) => {
                console.error('Error WebSocket:', err);
                setStatus(`Error de conexión en #${canal}`, 'error');
            });

            socket.addEventListener('close', (event) => {
                console.warn('Socket cerrado para', canal, 'code=', event.code, 'reason=', event.reason);
                setStatus(`Desconectado de #${canal} (${event.code})`, 'warning');
                clearChatTimers();
            });
        }

        if (!canalSolicitado) {
            mostrarEjemplos('Vista previa del widget. Agrega ?canal=tuCanal');
        } else {
            mostrarEjemplos(`Conectando al chat de ${canalSolicitado}...`);
            iniciarWidget();
        }
        
    </script>
