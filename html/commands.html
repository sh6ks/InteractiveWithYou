<!DOCTYPE html>
<html lang="es">
<!--
  commands.html
  Configurador de comandos personalizados y mensajes por timer para el chat widget.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos y Timers - InteractiveWithYou</title>
    <style>
        body {
            margin: 0;
            padding: 30px;
            background: transparent;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        .card {
            background: #161529;
            border: 1px solid rgba(145, 71, 255, 0.22);
            border-left: 5px solid #9147ff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }

        h2, h3 {
            margin: 0 0 10px;
            color: #b58aff;
        }

        p {
            color: #bdb7de;
            margin: 0 0 14px;
            line-height: 1.5;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #d5d2ea;
        }

        input, textarea {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #3b3660;
            background: #120f25;
            color: #eef2ff;
            padding: 10px 12px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        textarea {
            min-height: 72px;
            resize: vertical;
        }

        .inline {
            display: grid;
            grid-template-columns: 1fr 160px;
            gap: 10px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        button {
            border: none;
            border-radius: 10px;
            background: #9147ff;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            padding: 10px 14px;
        }

        button:hover {
            background: #772ce8;
        }

        .secondary {
            background: #3f3f46;
        }

        .list {
            margin-top: 12px;
            display: grid;
            gap: 10px;
            max-height: 380px;
            overflow: auto;
        }

        .item {
            border: 1px solid rgba(145, 71, 255, 0.24);
            background: rgba(18, 15, 37, 0.9);
            border-radius: 12px;
            padding: 10px;
            display: grid;
            gap: 8px;
        }

        .item-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .pill {
            font-size: 0.78rem;
            border-radius: 999px;
            padding: 4px 8px;
            background: rgba(122, 204, 120, 0.2);
            color: #8bffad;
            border: 1px solid rgba(122, 204, 120, 0.35);
        }

        .pill.off {
            background: rgba(255, 115, 115, 0.18);
            color: #ffb1b1;
            border-color: rgba(255, 115, 115, 0.35);
        }

        .meta {
            font-size: 0.9rem;
            color: #cbc4ed;
            word-break: break-word;
        }

        .status {
            min-height: 20px;
            margin-top: 12px;
            color: #bcb7db;
        }

        .status.ok { color: #7dffaf; }
        .status.err { color: #ff9ba3; }

        .hint {
            font-size: 0.88rem;
            color: #aaa4ca;
        }

        @media (max-width: 1024px) {
            .layout {
                grid-template-columns: 1fr;
            }

            body {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="card" style="margin-bottom:16px;">
        <h2>Comandos y Timers</h2>
        <p>Creá respuestas automáticas para tu overlay cuando alguien escriba un comando en el chat, y mensajes periódicos por tiempo.</p>
        <p class="hint">Ejemplo: comando <strong>!redes</strong> responde con tus redes. Los timers muestran mensajes automáticos cada X minutos.</p>
    </div>

    <div class="layout">
        <section class="card">
            <h3>Comando personalizado</h3>
            <div class="row">
                <label for="cmdTrigger">Comando</label>
                <input id="cmdTrigger" type="text" placeholder="!redes" maxlength="30">
            </div>
            <div class="row">
                <label for="cmdResponse">Respuesta del bot</label>
                <textarea id="cmdResponse" placeholder="Seguime en IG/TikTok: @tuusuario"></textarea>
            </div>
            <div class="row">
                <label><input id="cmdEnabled" type="checkbox" checked> Habilitado</label>
            </div>
            <div class="actions">
                <button id="addCommandBtn" type="button">Agregar comando</button>
            </div>
            <div id="commandsList" class="list"></div>
        </section>

        <section class="card">
            <h3>Mensaje por timer</h3>
            <div class="inline">
                <div class="row" style="margin-bottom:0;">
                    <label for="timerMessage">Mensaje del bot</label>
                    <input id="timerMessage" type="text" placeholder="Seguime en Instagram: @tuusuario" maxlength="220">
                </div>
                <div class="row" style="margin-bottom:0;">
                    <label for="timerMinutes">Cada (min)</label>
                    <input id="timerMinutes" type="number" min="1" max="120" step="1" value="5">
                </div>
            </div>
            <div class="row">
                <label><input id="timerEnabled" type="checkbox" checked> Habilitado</label>
            </div>
            <div class="actions">
                <button id="addTimerBtn" type="button">Agregar timer</button>
            </div>
            <div id="timersList" class="list"></div>
        </section>
    </div>

    <div class="card" style="margin-top:16px;">
        <div class="actions">
            <button id="saveBtn" type="button">Guardar configuración</button>
            <button id="reloadBtn" class="secondary" type="button">Recargar</button>
        </div>
        <div id="status" class="status" aria-live="polite"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
            authDomain: "interactivewithyou.firebaseapp.com",
            projectId: "interactivewithyou",
            storageBucket: "interactivewithyou.firebasestorage.app",
            messagingSenderId: "220446228684",
            appId: "1:220446228684:web:759044ab4365962d300269"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const cmdTrigger = document.getElementById('cmdTrigger');
        const cmdResponse = document.getElementById('cmdResponse');
        const cmdEnabled = document.getElementById('cmdEnabled');
        const commandsListEl = document.getElementById('commandsList');

        const timerMessage = document.getElementById('timerMessage');
        const timerMinutes = document.getElementById('timerMinutes');
        const timerEnabled = document.getElementById('timerEnabled');
        const timersListEl = document.getElementById('timersList');

        const addCommandBtn = document.getElementById('addCommandBtn');
        const addTimerBtn = document.getElementById('addTimerBtn');
        const saveBtn = document.getElementById('saveBtn');
        const reloadBtn = document.getElementById('reloadBtn');
        const statusEl = document.getElementById('status');

        let canalActual = '';
        let commands = [];
        let timers = [];

        const getTwitchChannelFromStorage = () => localStorage.getItem('nombreTwitch')?.toLowerCase() || '';

        function setStatus(message, type = '') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`.trim();
        }

        function normalizeTrigger(trigger) {
            const raw = (trigger || '').trim().toLowerCase();
            if (!raw) return '';
            const clean = raw.replace(/\s+/g, '');
            return clean.startsWith('!') ? clean : `!${clean}`;
        }

        function sanitizeCommands(list = []) {
            return list
                .map((item) => ({
                    trigger: normalizeTrigger(item?.trigger || ''),
                    response: (item?.response || '').toString().trim(),
                    enabled: item?.enabled !== false
                }))
                .filter((item) => item.trigger && item.response)
                .slice(0, 30);
        }

        function sanitizeTimers(list = []) {
            return list
                .map((item) => ({
                    message: (item?.message || '').toString().trim(),
                    minutes: Math.max(1, Math.min(120, Number(item?.minutes || 5))),
                    enabled: item?.enabled !== false
                }))
                .filter((item) => item.message)
                .slice(0, 20);
        }

        function renderCommands() {
            commandsListEl.innerHTML = '';
            if (commands.length === 0) {
                commandsListEl.innerHTML = '<div class="hint">No hay comandos creados.</div>';
                return;
            }

            commands.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'item';
                row.innerHTML = `
                    <div class="item-head">
                        <strong>${item.trigger}</strong>
                        <span class="pill ${item.enabled ? '' : 'off'}">${item.enabled ? 'Activo' : 'Pausado'}</span>
                    </div>
                    <div class="meta">${item.response}</div>
                    <div class="actions">
                        <button type="button" data-action="toggle" data-index="${index}" class="secondary">${item.enabled ? 'Pausar' : 'Activar'}</button>
                        <button type="button" data-action="delete" data-index="${index}" class="secondary">Eliminar</button>
                    </div>
                `;
                commandsListEl.appendChild(row);
            });
        }

        function renderTimers() {
            timersListEl.innerHTML = '';
            if (timers.length === 0) {
                timersListEl.innerHTML = '<div class="hint">No hay timers configurados.</div>';
                return;
            }

            timers.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'item';
                row.innerHTML = `
                    <div class="item-head">
                        <strong>Cada ${item.minutes} min</strong>
                        <span class="pill ${item.enabled ? '' : 'off'}">${item.enabled ? 'Activo' : 'Pausado'}</span>
                    </div>
                    <div class="meta">${item.message}</div>
                    <div class="actions">
                        <button type="button" data-action="toggle" data-index="${index}" class="secondary">${item.enabled ? 'Pausar' : 'Activar'}</button>
                        <button type="button" data-action="delete" data-index="${index}" class="secondary">Eliminar</button>
                    </div>
                `;
                timersListEl.appendChild(row);
            });
        }

        async function cargarConfiguracion() {
            if (!canalActual) {
                setStatus('No se detectó canal. Iniciá sesión con Twitch.', 'err');
                return;
            }

            try {
                const docRef = doc(db, 'usuarios', canalActual);
                const snap = await getDoc(docRef);
                const data = snap.exists() ? snap.data() : {};
                commands = sanitizeCommands(data.chatCommands || []);
                timers = sanitizeTimers(data.chatTimers || []);
                renderCommands();
                renderTimers();
                setStatus('Configuración cargada.', 'ok');
            } catch (error) {
                console.error('Error cargando comandos/timers:', error);
                setStatus('No se pudo cargar la configuración.', 'err');
            }
        }

        async function guardarConfiguracion() {
            if (!canalActual) {
                setStatus('No se detectó canal. Iniciá sesión con Twitch.', 'err');
                return;
            }

            try {
                await setDoc(doc(db, 'usuarios', canalActual), {
                    chatCommands: sanitizeCommands(commands),
                    chatTimers: sanitizeTimers(timers),
                    ultima_actualizacion: new Date()
                }, { merge: true });

                const user = auth.currentUser;
                if (user) {
                    await setDoc(doc(db, 'usuarios', user.uid), {
                        chatCommands: sanitizeCommands(commands),
                        chatTimers: sanitizeTimers(timers),
                        ultima_actualizacion: new Date()
                    }, { merge: true });
                }

                setStatus('Comandos y timers guardados. Refrescá el widget en OBS.', 'ok');
            } catch (error) {
                console.error('Error guardando comandos/timers:', error);
                setStatus('No se pudo guardar.', 'err');
            }
        }

        addCommandBtn.addEventListener('click', () => {
            const trigger = normalizeTrigger(cmdTrigger.value);
            const response = cmdResponse.value.trim();
            if (!trigger || !response) {
                setStatus('Completá comando y respuesta.', 'err');
                return;
            }

            if (commands.some((c) => c.trigger === trigger)) {
                setStatus('Ese comando ya existe.', 'err');
                return;
            }

            commands.push({
                trigger,
                response,
                enabled: Boolean(cmdEnabled.checked)
            });

            commands = sanitizeCommands(commands);
            cmdTrigger.value = '';
            cmdResponse.value = '';
            cmdEnabled.checked = true;
            renderCommands();
            setStatus('Comando agregado (falta guardar).');
        });

        addTimerBtn.addEventListener('click', () => {
            const message = timerMessage.value.trim();
            const minutes = Math.max(1, Math.min(120, Number(timerMinutes.value || 5)));
            if (!message) {
                setStatus('Escribí un mensaje para el timer.', 'err');
                return;
            }

            timers.push({
                message,
                minutes,
                enabled: Boolean(timerEnabled.checked)
            });

            timers = sanitizeTimers(timers);
            timerMessage.value = '';
            timerMinutes.value = 5;
            timerEnabled.checked = true;
            renderTimers();
            setStatus('Timer agregado (falta guardar).');
        });

        commandsListEl.addEventListener('click', (event) => {
            const target = event.target;
            if (!(target instanceof HTMLButtonElement)) return;
            const index = Number(target.dataset.index);
            const action = target.dataset.action;
            if (!Number.isInteger(index) || index < 0 || index >= commands.length) return;

            if (action === 'delete') {
                commands.splice(index, 1);
            } else if (action === 'toggle') {
                commands[index].enabled = !commands[index].enabled;
            }

            renderCommands();
            setStatus('Cambios pendientes (falta guardar).');
        });

        timersListEl.addEventListener('click', (event) => {
            const target = event.target;
            if (!(target instanceof HTMLButtonElement)) return;
            const index = Number(target.dataset.index);
            const action = target.dataset.action;
            if (!Number.isInteger(index) || index < 0 || index >= timers.length) return;

            if (action === 'delete') {
                timers.splice(index, 1);
            } else if (action === 'toggle') {
                timers[index].enabled = !timers[index].enabled;
            }

            renderTimers();
            setStatus('Cambios pendientes (falta guardar).');
        });

        saveBtn.addEventListener('click', guardarConfiguracion);
        reloadBtn.addEventListener('click', cargarConfiguracion);

        onAuthStateChanged(auth, async (user) => {
            canalActual = getTwitchChannelFromStorage() || user?.displayName?.toLowerCase() || '';
            if (!canalActual) {
                setStatus('Iniciá sesión para usar comandos y timers.', 'err');
                return;
            }
            await cargarConfiguracion();
        });
    </script>
</body>
</html>
