<!DOCTYPE html>
<html lang="es">
<!--
  functions.html
  Página de selección de herramientas, como widget de chat y alertas en vivo.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones - Interactive With You</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Usamos fondo transparente para que se vea el del index.html */
        body { 
            background: transparent !important; 
            margin: 0; 
            padding: 30px; 
            color: white; 
            font-family: 'Poppins', sans-serif;
        }
        
        .grid-funciones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            overflow: visible;
        }
        
        /* Tus antiguas clases .btn-main mejoradas como .card-funcion */
        .card-funcion {
            background: #1d1b31;
            border: 2px solid #3f3f46;
            padding: 18px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 180px;
            box-sizing: border-box;
            position: relative;
        }
        
        .card-funcion:hover {
            border-color: #9147ff;
            transform: scale(1.02);
            background: #24223d;
            box-shadow: 0 8px 20px rgba(145, 71, 255, 0.16);
            z-index: 1;
        }

        .card-funcion i { 
            font-size: 3rem; 
            color: #a970ff; 
            margin-bottom: 20px; 
        }
        
        .card-funcion strong { 
            font-size: 1.5rem; 
            margin-bottom: 10px;
            display: block;
        }

        .card-funcion p {
            color: #adadb8;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .locked {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        @media (max-width: 1024px) {
            body { padding: 20px; }
            .card-funcion { padding: 24px; }
        }

        @media (max-width: 720px) {
            body { padding: 14px; }
            .grid-funciones { gap: 12px; }
            .card-funcion { padding: 20px; min-height: auto; }
            .card-funcion i { font-size: 2.4rem; margin-bottom: 14px; }
            .card-funcion strong { font-size: 1.3rem; }
            .card-funcion p { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
<!-- Contenido con tarjetas de funciones disponibles y próximas herramientas -->

    <h2 style="margin-bottom: 30px;">Elegí una herramienta 🛠️</h2>

    <div class="grid-funciones">
        <div class="card-funcion" onclick="parent.cargarSeccion('chat')">
            <i class="fa-solid fa-comment-dots"></i>
            <strong>Widget de Chat</strong>
            <p>Personalizá colores y fuentes de Google para tu chat de Twitch.</p>
        </div>

        <div class="card-funcion" onclick="parent.cargarSeccion('alerts')">
            <i class="fa-solid fa-bell"></i>
            <strong>Alertas en vivo</strong>
            <p>Notificaciones visuales para tu overlay en OBS.</p>
        </div>

        <div class="card-funcion locked">
            <i class="fa-solid fa-terminal"></i>
            <strong>Comandos en el chat</strong>
            <p>Próximamente disponible.</p>
        </div>
    </div>

</body>
</html>
