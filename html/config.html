<!DOCTYPE html>
<html lang="es">
<!--
  config.html
  Configurador del widget de chat: canal, color, fuente y enlace para OBS.
-->
<head>
    <meta charset="UTF-8">
    <title>Configurador - InteractiveWithYou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <style>
       body { 
        font-family: 'Poppins', sans-serif; 
        background: transparent; 
        color: white; 
        display: flex; 
        justify-content: center; 
        padding: 50px; 
    }
    
    .card { 
        background: #161529; 
        padding: 30px; 
        border-radius: 20px; 
        border: 1px solid rgba(145, 71, 255, 0.2);
        box-shadow: 0 20px 60px rgba(0,0,0,0.4); 
        width: 100%; 
        max-width: 480px;
        min-width: 0;
        border-left: 5px solid #9147ff; 
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        z-index: 1;
    }
    .card:hover {
        transform: scale(1.01);
        box-shadow: 0 14px 46px rgba(0,0,0,0.75);
    }
    
    h2 { color: #a970ff; margin-top: 0; font-weight: 600; }
    p { color: #adadb8; font-size: 0.9rem; }
    
    label { display: block; margin: 14px 0 6px; color: #bdb9ff; font-weight: 600; font-size: 0.85rem; }
    
    input, select, textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #3b3660;
        background: #120f25;
        color: #eef2ff;
        padding: 10px 12px;
        box-sizing: border-box;
        font-size: 0.95rem;
        transition: all 0.2s;
    }
    
    input[type="color"] {
        padding: 8px;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #9147ff;
        outline: none;
        box-shadow: 0 0 10px rgba(145, 71, 255, 0.25);
    }
    
    button { 
        width: 100%; 
        margin-top: 25px; 
        padding: 14px; 
        background: #9147ff; 
        color: white; 
        border: none; 
        border-radius: 10px; 
        font-weight: 700; 
        cursor: pointer; 
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    button:hover { 
        background: #772ce8; 
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(145, 71, 255, 0.25);
    }

    .actions-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 25px;
    }

    .actions-row button {
        margin-top: 0;
    }

    .save-feedback {
        margin-top: 12px;
        font-size: 0.85rem;
        color: #bfc3da;
        min-height: 20px;
        opacity: 0;
        transition: opacity 0.2s ease;
    }

    .save-feedback.show {
        opacity: 1;
    }

    .save-feedback.success {
        color: #7dffaf;
    }

    .save-feedback.error {
        color: #ff9ba3;
    }

    .secondary-btn {
        background: #3f3f46;
    }

    .secondary-btn:hover {
        background: #2f2f35;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.22);
    }
    
    #resultado { 
        margin-top: 25px; 
        padding: 20px; 
        background: #0e0e10; 
        border: 1px dashed #9147ff; 
        border-radius: 10px;
        word-break: break-all; 
        display: none; 
        animation: fadeIn 0.5s ease;
    }

    .layout {
        display: grid;
        grid-template-columns: repeat(2, minmax(320px, 1fr));
        gap: 32px;
        width: min(100%, 1000px);
        margin: 0 auto;
        align-items: start;
        position: relative;
        z-index: 0;
    }

    .preview-card {
        background: #161529;
        padding: 30px;
        border-radius: 20px;
        border: 1px solid rgba(145, 71, 255, 0.2);
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        border-left: 5px solid #9147ff;
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 440px;
    }

    .preview-header h3 {
        margin: 0 0 6px;
        color: #a970ff;
    }

    .preview-header p {
        margin: 0;
        color: #adadb8;
        font-size: 0.95rem;
    }

    .preview-chat {
        background: rgba(255,255,255,0.04);
        border-radius: 18px;
        min-height: 340px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 14px;
        overflow: hidden;
        position: relative;
    }

    .preview-chat::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 35%);
        pointer-events: none;
    }

    .preview-message {
        position: relative;
        background: rgba(0, 0, 0, 0.75);
        border-left: 5px solid #9147ff;
        padding: 14px 18px;
        border-radius: 0 18px 18px 0;
        color: #fff;
        font-size: 0.95rem;
        line-height: 1.35;
        box-shadow: 0 12px 24px rgba(0,0,0,0.25);
        opacity: 0;
        animation-duration: 0.6s;
        animation-fill-mode: forwards;
    }

    .preview-message.from-top { animation-name: apareceDesdeArriba; }
    .preview-message.from-bottom { animation-name: apareceDesdeAbajo; }
    .preview-message.from-left { animation-name: apareceDesdeIzquierda; }
    .preview-message.from-right { animation-name: apareceDesdeDerecha; }

    .preview-message.slide { animation-timing-function: cubic-bezier(0.23, 1, 0.32, 1); }
    .preview-message.appear { animation-name: apareceConFade; }
    .preview-message.fade { animation-name: aparecerSoloFade; }

    .preview-footer {
        color: #c9c9d0;
        font-size: 0.88rem;
        line-height: 1.5;
    }

    @keyframes apareceDesdeArriba {
        from { opacity: 0; transform: translateY(-24px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes apareceDesdeAbajo {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes apareceDesdeIzquierda {
        from { opacity: 0; transform: translateX(-28px); }
        to { opacity: 1; transform: translateX(0); }
    }

    @keyframes apareceDesdeDerecha {
        from { opacity: 0; transform: translateX(28px); }
        to { opacity: 1; transform: translateX(0); }
    }

    @keyframes apareceConFade {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes aparecerSoloFade {
        from { opacity: 0; transform: translateY(0); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
        body { padding: 30px; }
        .layout { grid-template-columns: 1fr; }
        .actions-row { grid-template-columns: 1fr; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    </style>
</head>
<body>
<!-- Formulario de configuración del widget y resultado del enlace generado -->

<div class="layout">
    <div class="card">
    <h2>InteractiveWithYou</h2>
    <p>Configurá tu widget de chat</p>
    
    <label>Nombre de tu Canal:</label>
    <input type="text" id="canal" placeholder="ej: shekssink">

    <label>Color del borde:</label>
    <input type="color" id="color" value="#9147ff">

    <label>Fuente:</label>
    <select id="fuente">
        <option value="Poppins">Poppins</option>
        <option value="Roboto">Roboto</option>
        <option value="Bangers">Bangers</option>
        <option value="Montserrat">Montserrat</option>
    </select>

    <label>Animación de ingreso:</label>
    <select id="animacionDireccion">
        <option value="from-top">Desde arriba</option>
        <option value="from-bottom">Desde abajo</option>
        <option value="from-left">Desde la izquierda</option>
        <option value="from-right">Desde la derecha</option>
    </select>

    <label>Estilo de aparición:</label>
    <select id="animacionEstilo">
        <option value="slide">Deslizar</option>
        <option value="appear">Aparecer</option>
        <option value="fade">Fade</option>
    </select>

    <div class="actions-row">
        <button class="secondary-btn" onclick="guardarConfiguracion()">Guardar configuración</button>
        <button onclick="generarLink()">Generar Link para OBS</button>
    </div>
    <div id="saveFeedback" class="save-feedback" aria-live="polite"></div>

    <div id="resultado">
    <small>Copiá este link en OBS:</small><br>
    <strong id="linkFinal"></strong>
    <button onclick="copiarAlPortapapeles()" style="margin-top: 10px; background: #3f3f46;">
        Copiar Link
    </button>
</div>
</div>

    <div class="preview-card">
        <div class="preview-header">
            <h3>Vista previa del chat</h3>
            <p>Así se verá tu widget cuando se conecte al canal.</p>
        </div>
        <div class="preview-chat" id="chatPreview"></div>
        <div class="preview-footer">Los mensajes aparecen con efectos deslizantes desde arriba, abajo o desde la izquierda.</div>
    </div>
</div>

<script type="module">
    // Script de configuración: genera el link del widget y guarda la configuración del canal.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
        authDomain: "interactivewithyou.firebaseapp.com",
        projectId: "interactivewithyou",
        storageBucket: "interactivewithyou.firebasestorage.app",
        messagingSenderId: "220446228684",
        appId: "1:220446228684:web:759044ab4365962d300269"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let usuarioActual = null;
    const canalInput = document.getElementById('canal');
    const animacionDireccionSelect = document.getElementById('animacionDireccion');
    const animacionEstiloSelect = document.getElementById('animacionEstilo');
    const selectFuente = document.getElementById('fuente');
    const inputColor = document.getElementById('color');
    const previewChat = document.getElementById('chatPreview');
    const saveFeedback = document.getElementById('saveFeedback');

    const API_KEY = 'AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE';
    const sampleMessages = [
        { usuario: 'StreamBot', mensaje: '¡Bienvenidos al stream!', color: '#55c2ff' },
        { usuario: 'Gamer123', mensaje: '¿Qué vamos a hacer hoy?', color: '#ffb300' },
        { usuario: 'ViewerGirl', mensaje: 'Ese overlay se ve increíble ✨', color: '#7cff86' },
        { usuario: 'Mod', mensaje: 'Recuerden seguir y activar la campana.', color: '#ff6b8d' }
    ];
    let previewInterval = null;
    let previewIndex = 0;

    const getTwitchChannelFromStorage = () => localStorage.getItem('nombreTwitch')?.toLowerCase() || '';

    function showSaveFeedback(message, type = 'success') {
        saveFeedback.textContent = message;
        saveFeedback.className = `save-feedback show ${type}`;
        clearTimeout(showSaveFeedback.timer);
        showSaveFeedback.timer = setTimeout(() => {
            saveFeedback.className = 'save-feedback';
        }, 2600);
    }

    const setCanalReadonly = (readonly) => {
        canalInput.readOnly = readonly;
        canalInput.style.background = readonly ? '#2a273f' : '#11101d';
        canalInput.style.cursor = readonly ? 'not-allowed' : 'text';
    };

    async function cargarFuentesDeGoogle() {
        try {
            const response = await fetch(`https://www.googleapis.com/webfonts/v1/webfonts?sort=popularity&key=${API_KEY}`);
            const data = await response.json();

            if (data.items) {
                const allowedCategories = ['sans-serif', 'serif', 'display', 'handwriting', 'monospace'];
                const fontesParaCargar = data.items
                    .filter(font => allowedCategories.includes(font.category))
                    .filter(font => !font.family.toLowerCase().includes('material icons'))
                    .filter(font => !font.family.toLowerCase().includes('emoji'))
                    .slice(0, 120);

                const familias = fontesParaCargar.map(font => font.family);
                WebFont.load({ google: { families: familias } });

                selectFuente.innerHTML = '';
                fontesParaCargar.forEach(font => {
                    const option = document.createElement('option');
                    option.value = font.family;
                    option.textContent = font.family;
                    option.style.fontFamily = `'${font.family}', sans-serif`;
                    selectFuente.appendChild(option);
                });
            }
        } catch (error) {
            console.error('Error al cargar fuentes:', error);
            selectFuente.innerHTML = '<option value="Poppins">Poppins</option><option value="Roboto">Roboto</option>'; 
        }
    }

    function loadFont(family) {
        WebFont.load({ google: { families: [family] } });
    }

    function mapDirectionClass() {
        return animacionDireccionSelect.value || 'from-top';
    }

    function mapStyleClass() {
        return animacionEstiloSelect.value || 'slide';
    }

    function addPreviewMessage() {
        const item = sampleMessages[previewIndex % sampleMessages.length];
        const div = document.createElement('div');
        div.className = `preview-message ${mapDirectionClass()} ${mapStyleClass()}`;
        div.style.borderLeftColor = inputColor.value;
        div.innerHTML = `<strong style="color:${item.color};">${item.usuario}:</strong> ${item.mensaje}`;
        previewChat.appendChild(div);
        if (previewChat.children.length > 5) {
            previewChat.removeChild(previewChat.firstElementChild);
        }
        previewIndex += 1;
    }

    function renderPreview() {
        previewChat.innerHTML = '';
        previewChat.style.fontFamily = `'${selectFuente.value}', sans-serif`;
        previewIndex = 0;
        addPreviewMessage();
        clearInterval(previewInterval);
        previewInterval = setInterval(addPreviewMessage, 2200);
    }

    onAuthStateChanged(auth, async (user) => {
        setCanalReadonly(false);

        if (user) {
            usuarioActual = user;
            const docRef = doc(db, 'usuarios', user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                canalInput.value = data.canal || getTwitchChannelFromStorage();
                inputColor.value = data.color || '#9147ff';
                selectFuente.value = data.fuente || 'Poppins';
                animacionDireccionSelect.value = data.animacionDireccion || 'from-top';
                animacionEstiloSelect.value = data.animacionEstilo || 'slide';
            } else {
                canalInput.value = getTwitchChannelFromStorage();
            }
            setCanalReadonly(Boolean(getTwitchChannelFromStorage()));
            loadFont(selectFuente.value);
            renderPreview();
            return;
        }

        const twitchChannel = getTwitchChannelFromStorage();
        if (twitchChannel) {
            canalInput.value = twitchChannel;
            setCanalReadonly(true);
            // Carga configuración guardada para este canal Twitch
            try {
                const docRef = doc(db, 'usuarios', twitchChannel);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    inputColor.value = data.color || '#9147ff';
                    selectFuente.value = data.fuente || 'Poppins';
                    animacionDireccionSelect.value = data.animacionDireccion || 'from-top';
                    animacionEstiloSelect.value = data.animacionEstilo || 'slide';
                }
            } catch (e) {
                console.warn('No se pudo cargar config de canal Twitch:', e);
            }
            loadFont(selectFuente.value);
            renderPreview();
            return;
        }

        alert('Primero debés iniciar sesión.');
        window.parent.location.href = '/index.html';
    });

    async function persistirConfiguracion(canal, color, fuente) {
        if (usuarioActual) {
            await setDoc(doc(db, 'usuarios', usuarioActual.uid), {
                uid: usuarioActual.uid,
                email: usuarioActual.email || '',
                canal,
                color,
                fuente,
                animacionDireccion: animacionDireccionSelect.value,
                animacionEstilo: animacionEstiloSelect.value,
                ultima_actualizacion: new Date()
            });
            return;
        }

        if (canal) {
            // Usuario logueado con Twitch: guarda con el canal como ID del doc
            await setDoc(doc(db, 'usuarios', canal), {
                canal,
                color,
                fuente,
                animacionDireccion: animacionDireccionSelect.value,
                animacionEstilo: animacionEstiloSelect.value,
                ultima_actualizacion: new Date()
            });
        }
    }

    window.guardarConfiguracion = async function() {
        const canal = canalInput.value.trim().toLowerCase() || getTwitchChannelFromStorage();
        const color = inputColor.value;
        const fuente = selectFuente.value;

        if (!canal) {
            showSaveFeedback('Poné el nombre de tu canal para guardar.', 'error');
            return;
        }

        try {
            await persistirConfiguracion(canal, color, fuente);
            showSaveFeedback('Configuración guardada correctamente.', 'success');
        } catch (error) {
            console.error('Error al guardar:', error);
            showSaveFeedback('No se pudo guardar la configuración.', 'error');
        }
    };

    window.generarLink = async function() {
        const canal = canalInput.value.trim().toLowerCase() || getTwitchChannelFromStorage();
        const color = inputColor.value;
        const fuente = selectFuente.value;

        if (!canal) {
            alert('¡Poné el nombre de tu canal!');
            return;
        }

        try {
            const urlBase = 'https://interactive-with-you.vercel.app/widget.html';
            const linkCompleto = `${urlBase}?canal=${canal}`;

            await persistirConfiguracion(canal, color, fuente);

            document.getElementById('linkFinal').innerText = linkCompleto;
            document.getElementById('resultado').style.display = 'block';
        } catch (error) {
            console.error('Error al guardar:', error);
            alert('Error al conectar con la base de datos.');
        }
    };

    window.copiarAlPortapapeles = function() {
        const link = document.getElementById('linkFinal').innerText;
        navigator.clipboard.writeText(link).then(() => {
            showSaveFeedback('Link copiado correctamente.', 'success');
        }).catch(() => {
            showSaveFeedback('No se pudo copiar el link.', 'error');
        });
    };

    inputColor.addEventListener('input', () => {
        inputColor.style.borderBottom = `2px solid ${inputColor.value}`;
        document.getElementById('resultado').style.borderColor = inputColor.value;
        renderPreview();
    });

    selectFuente.addEventListener('change', () => {
        document.getElementById('resultado').style.display = 'none';
        loadFont(selectFuente.value);
        renderPreview();
    });

    const previewControls = [canalInput, selectFuente, animacionDireccionSelect, animacionEstiloSelect];
    previewControls.forEach(el => {
        el.addEventListener('input', () => {
            document.getElementById('resultado').style.display = 'none';
            renderPreview();
        });
    });

    cargarFuentesDeGoogle().then(() => {
        if (!selectFuente.value) selectFuente.value = 'Poppins';
        loadFont(selectFuente.value);
        renderPreview();
    });
</script>

</body>
</html>
