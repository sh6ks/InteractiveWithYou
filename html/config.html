<!DOCTYPE html>
<html lang="es">
<!--
  config.html
  Configurador del widget de chat: canal, color, fuente y enlace para OBS.
-->
<head>
    <meta charset="UTF-8">
    <title>Configurador - InteractiveWithYou</title>
    <style>
       body { 
        font-family: 'Poppins', sans-serif; 
        background: transparent; 
        color: white; 
        display: flex; 
        justify-content: center; 
        padding: 50px; 
    }
    
    .card { 
        background: #1d1b31; 
        padding: 30px; 
        border-radius: 15px; 
        border: 1px solid #333;
        box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
        width: 450px; 
        border-left: 5px solid #9147ff; 
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
        transform: scale(1.01);
        box-shadow: 0 14px 46px rgba(0,0,0,0.75);
    }
    
    h2 { color: #a970ff; margin-top: 0; font-weight: 600; }
    p { color: #adadb8; font-size: 0.9rem; }
    
    label { display: block; margin: 20px 0 8px; font-weight: bold; color: #efeff1; }
    
    input, select { 
        width: 100%; 
        padding: 12px; 
        border-radius: 8px; 
        border: 1px solid #3f3f46; 
        background: #11101d; 
        color: white; 
        box-sizing: border-box; 
        transition: 0.3s;
    }
    
    input:focus, select:focus {
        border-color: #9147ff;
        outline: none;
        box-shadow: 0 0 10px rgba(145, 71, 255, 0.3);
    }
    
    button { 
        width: 100%; 
        margin-top: 25px; 
        padding: 14px; 
        background: #9147ff; 
        color: white; 
        border: none; 
        border-radius: 8px; 
        font-weight: bold; 
        cursor: pointer; 
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    button:hover { 
        background: #772ce8; 
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(145, 71, 255, 0.4);
    }
    
    #resultado { 
        margin-top: 25px; 
        padding: 20px; 
        background: #0e0e10; 
        border: 1px dashed #9147ff; 
        border-radius: 10px;
        word-break: break-all; 
        display: none; 
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    </style>
</head>
<body>
<!-- Formulario de configuración del widget y resultado del enlace generado -->

<div class="card">
    <h2>InteractiveWithYou</h2>
    <p>Configurá tu widget de chat</p>
    
    <label>Nombre de tu Canal:</label>
    <input type="text" id="canal" placeholder="ej: shekssink">

    <label>Color del borde:</label>
    <input type="color" id="color" value="#9147ff">

    <label>Fuente:</label>
    <select id="fuente">
    </select>

    <button onclick="generarLink()">Generar Link para OBS</button>

    <div id="resultado">
    <small>Copiá este link en OBS:</small><br>
    <strong id="linkFinal"></strong>
    <button onclick="copiarAlPortapapeles()" style="margin-top: 10px; background: #3f3f46;">
        Copiar Link
    </button>
</div>
</div>

<script type="module">
    // Script de configuración: genera el link del widget y guarda la configuración del canal.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
        authDomain: "interactivewithyou.firebaseapp.com",
        projectId: "interactivewithyou",
        storageBucket: "interactivewithyou.firebasestorage.app",
        messagingSenderId: "220446228684",
        appId: "1:220446228684:web:759044ab4365962d300269"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let usuarioActual = null;
    const canalInput = document.getElementById('canal');

    // Obtiene el canal guardado si el usuario se autenticó con Twitch.
    const getTwitchChannelFromStorage = () => {
        return localStorage.getItem('nombreTwitch')?.toLowerCase() || '';
    };

    const setCanalReadonly = (readonly) => {
        canalInput.readOnly = readonly;
        canalInput.style.background = readonly ? '#2a273f' : '#11101d';
        canalInput.style.cursor = readonly ? 'not-allowed' : 'text';
    };

    onAuthStateChanged(auth, async (user) => {
        setCanalReadonly(false);

        if (user) {
            usuarioActual = user;
            console.log("Configurando para:", user.displayName);
            
            const docRef = doc(db, "usuarios", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                canalInput.value = data.canal;
                document.getElementById('color').value = data.color;
                document.getElementById('fuente').value = data.fuente;
            }
            return;
        }

        const twitchChannel = getTwitchChannelFromStorage();
        if (twitchChannel) {
            canalInput.value = twitchChannel;
            setCanalReadonly(true);
            return;
        }

        alert("Primero debés iniciar sesión.");
        window.parent.location.href = "/index.html"; 
    });

    // Genera el enlace del widget y guarda la configuración de canal en Firestore.
    window.generarLink = async function() {
        const canal = document.getElementById('canal').value.trim().toLowerCase() || getTwitchChannelFromStorage();
        const color = document.getElementById('color').value;
        const fuente = document.getElementById('fuente').value;

        if(!canal) { alert("¡Poné el nombre de tu canal!"); return; }

        try {
            if (usuarioActual) {
                await setDoc(doc(db, "usuarios", usuarioActual.uid), {
                    uid: usuarioActual.uid,
                    email: usuarioActual.email || "",
                    canal: canal,
                    color: color,
                    fuente: fuente,
                    ultima_actualizacion: new Date()
                });
                console.log("¡Configuración guardada en la nube para:", canal, "!");
            } else {
                console.log("Usuario Twitch sin Firebase: link generado localmente para:", canal);
            }

            const urlBase = "https://interactive-with-you.vercel.app/widget.html";
            const linkCompleto = `${urlBase}?canal=${canal}`;
            
            document.getElementById('linkFinal').innerText = linkCompleto;
            document.getElementById('resultado').style.display = 'block';
        } catch (error) {
            console.error("Error al guardar:", error);
            alert("Error al conectar con la base de datos.");
        }
    }

    window.copiarAlPortapapeles = function() {
        const link = document.getElementById('linkFinal').innerText;
        navigator.clipboard.writeText(link).then(() => {
            alert("¡Link copiado! Pegalo en OBS.");
        });
    }

    const inputColor = document.getElementById('color');
    inputColor.addEventListener('input', () => {
        inputColor.style.borderBottom = `2px solid ${inputColor.value}`;
        document.getElementById('resultado').style.borderColor = inputColor.value;
    });

    const campos = [document.getElementById('canal'), document.getElementById('color'), document.getElementById('fuente')];
    campos.forEach(campo => {
        campo.addEventListener('input', () => {
            document.getElementById('resultado').style.display = 'none';
        });
    });

    const API_KEY = 'AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE'; 
    const selectFuente = document.getElementById('fuente');

    // Descarga las fuentes de Google Fonts para llenar el selector de fuentes.
    async function cargarFuentesDeGoogle() {
        try {
            const response = await fetch(`https://www.googleapis.com/webfonts/v1/webfonts?sort=popularity&key=${API_KEY}`);
            const data = await response.json();

            if (data.items) {
                selectFuente.innerHTML = ''; 
                data.items.slice(0, 150).forEach(font => {
                    const option = document.createElement('option');
                    option.value = font.family;
                    option.textContent = font.family;
                    selectFuente.appendChild(option);
                });
            }
        } catch (error) {
            console.error("Hubo un problema al traer las fuentes:", error);
        }
    }

    cargarFuentesDeGoogle();

    selectFuente.addEventListener('change', () => {
        document.getElementById('resultado').style.display = 'none';
    });
</script>

</body>
</html>
