<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alertas en vivo - InteractiveWithYou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: transparent;
            color: #eef2ff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px;
        }

        .card {
            width: min(1400px, 100%);
            background: #161529;
            border: none;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        
        h1 { margin: 0 0 18px; font-size: 2rem; color: #d9d7ff; }
        p { color: #adadb8; font-size: 0.9rem; margin-top: 0; }

        .container-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 20px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            color: #bdb9ff;
            font-weight: 600;
            font-size: 0.85rem;
        }

        input, select, textarea {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #3b3660;
            background: #120f25;
            color: #eef2ff;
            padding: 10px 12px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        input[type="range"] {
            padding: 0;
            height: 4px;
        }

        input[type="file"]::file-selector-button {
            background: #9147ff;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 8px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background: #772ce8;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-top: 12px;
        }

        button:hover { transform: translateY(-2px); }

        .btn-primary { background: #9147ff; color: white; }
        .btn-secondary { background: #27223d; color: #dcd7ff; }

        .field-group { display: flex; flex-direction: column; gap: 8px; }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            background: rgba(145, 71, 255, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(145, 71, 255, 0.3);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .checkbox-item input {
            width: auto;
            margin: 0;
        }

        .range-value {
            display: inline-block;
            margin-left: 8px;
            color: #a970ff;
            font-size: 0.85rem;
        }

        .info-box {
            background: rgba(145, 71, 255, 0.1);
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(145, 71, 255, 0.2);
            font-size: 0.9rem;
            margin-top: 14px;
        }

        .info-box ol {
            padding-left: 18px;
            margin: 8px 0 0;
            color: #cfc9ff;
        }

        small {
            color: #999;
            display: block;
            margin-top: 4px;
        }

        /* Preview */
        #alertPreview {
            background: linear-gradient(135deg, #1e1b3d 0%, #2d2851 100%);
            border-radius: 16px;
            padding: 30px;
            min-height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(145, 71, 255, 0.3);
        }

        .alert-content {
            text-align: center;
            max-width: 100%;
            width: 100%;
        }

        .alert-media {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .alert-text {
            margin: 0;
            word-wrap: break-word;
            font-weight: bold;
        }

        @keyframes vibrate {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-35px); }
        }

        @keyframes zoomAnim {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.35); }
        }

        .effect-vibrate { animation: vibrate 0.4s infinite; }
        .effect-bounce { animation: bounce 0.7s infinite; }
        .effect-zoom { animation: zoomAnim 0.9s infinite; }

        @media (max-width: 1200px) {
            .container-main { grid-template-columns: 1fr; }
        }

        @media (max-width: 720px) {
            body { padding: 16px; }
            .card { padding: 16px; }
            #alertPreview { min-height: 300px; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Alertas en vivo</h1>
        <p>Diseña alertas personalizadas con fuentes, efectos y sonidos</p>

        <div class="container-main">
            <!-- Formulario -->
            <div>
                <div class="field-group">
                    <label>Nombre de canal</label>
                    <input id="canal" placeholder="ej: shekssink" />
                </div>

                <div class="field-group">
                    <label>Tipo de alerta</label>
                    <select id="tipo">
                        <option value="image">Imagen</option>
                        <option value="video">Video</option>
                        <option value="sound">Sonido</option>
                    </select>
                </div>

                <div class="field-group">
                    <label>URL del asset</label>
                    <input id="assetUrl" placeholder="https://.../alert.mp3" />
                </div>

                <div class="field-group">
                    <label>O sube un archivo (máx. 25 MB)</label>
                    <input id="assetFile" type="file" accept="image/*,video/*,audio/*" />
                    <small id="fileInfo" style="display: none;"></small>
                </div>

                <div class="field-group">
                    <label>Sonido adicional (opcional)</label>
                    <input id="soundFile" type="file" accept="audio/*" />
                    <small id="soundInfo" style="display: none;"></small>
                </div>

                <div class="field-group">
                    <label>Texto de la alerta</label>
                    <textarea id="alertText" placeholder="Texto para mostrar en la alerta"></textarea>
                </div>

                <div class="field-group">
                    <label>Tipo de letra</label>
                    <select id="fuente"></select>
                </div>

                <div class="field-group">
                    <label>Tamaño de texto <span class="range-value" id="sizeValue">32px</span></label>
                    <input id="fontSize" type="range" min="16" max="72" value="32" />
                </div>

                <div class="field-group">
                    <label>Color del texto</label>
                    <input id="textColor" type="color" value="#d9d7ff" />
                </div>

                <div class="field-group">
                    <label>Efectos</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input id="effectVibrate" type="checkbox" />
                            <label for="effectVibrate">Vibrar</label>
                        </div>
                        <div class="checkbox-item">
                            <input id="effectBounce" type="checkbox" />
                            <label for="effectBounce">Rebotar</label>
                        </div>
                        <div class="checkbox-item">
                            <input id="effectZoom" type="checkbox" />
                            <label for="effectZoom">Zoom</label>
                        </div>
                    </div>
                </div>

                <div class="field-group">
                    <label>Duración (segundos)</label>
                    <input id="duration" type="number" value="8" min="2" />
                </div>

                <button class="btn-primary" id="createButton">Crear alerta</button>
                <button class="btn-secondary" id="sampleImage">Prueba: Imagen</button>
                <button class="btn-secondary" id="sampleVideo">Prueba: Video</button>
            </div>

            <!-- Preview -->
            <div>
                <label style="margin-top: 0;">Vista previa de la alerta</label>
                <div id="alertPreview">
                    <div class="alert-content">
                        <img id="previewMedia" class="alert-media" src="" style="display: none;" />
                        <video id="previewVideo" class="alert-media" style="display: none;" controls></video>
                        <p class="alert-text" id="previewText">Texto de la alerta</p>
                    </div>
                </div>

                <div class="info-box">
                    <strong>Instrucciones:</strong>
                    <ol>
                        <li>Configura los parámetros de tu alerta</li>
                        <li>Ve el preview en tiempo real</li>
                        <li>Presiona "Crear alerta"</li>
                        <li>El overlay la mostrará automáticamente</li>
                    </ol>
                </div>

                <div class="field-group">
                    <label>Link del overlay</label>
                    <input id="overlayLink" readonly />
                    <button class="btn-secondary" id="copyOverlay">Copiar link</button>
                    <button class="btn-secondary" id="openOverlay">Abrir overlay</button>
                </div>

                <div id="status" class="info-box" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
            authDomain: "interactivewithyou.firebaseapp.com",
            projectId: "interactivewithyou",
            storageBucket: "interactivewithyou.firebasestorage.app",
            messagingSenderId: "220446228684",
            appId: "1:220446228684:web:759044ab4365962d300269"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const CLOUDINARY_CLOUD_NAME = 'dbzcmpwrn';
        const CLOUDINARY_UPLOAD_PRESET = 'alerts_preset';
        const MAX_FILE_SIZE = 25 * 1024 * 1024;
        const API_KEY = 'AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE';

        let uploadedFileUrl = '';
        let uploadedSoundUrl = '';

        // DOM
        const canalInput = document.getElementById('canal');
        const tipoSelect = document.getElementById('tipo');
        const assetInput = document.getElementById('assetUrl');
        const assetFileInput = document.getElementById('assetFile');
        const soundFileInput = document.getElementById('soundFile');
        const fileInfoSpan = document.getElementById('fileInfo');
        const soundInfoSpan = document.getElementById('soundInfo');
        const textInput = document.getElementById('alertText');
        const fuenteSelect = document.getElementById('fuente');
        const fontSizeInput = document.getElementById('fontSize');
        const sizeValue = document.getElementById('sizeValue');
        const textColorInput = document.getElementById('textColor');
        const effectVibrate = document.getElementById('effectVibrate');
        const effectBounce = document.getElementById('effectBounce');
        const effectZoom = document.getElementById('effectZoom');
        const durationInput = document.getElementById('duration');
        const createButton = document.getElementById('createButton');
        const statusBox = document.getElementById('status');
        const overlayLinkInput = document.getElementById('overlayLink');
        const copyOverlay = document.getElementById('copyOverlay');
        const openOverlay = document.getElementById('openOverlay');
        const sampleImage = document.getElementById('sampleImage');
        const sampleVideo = document.getElementById('sampleVideo');

        // Preview
        const alertPreview = document.getElementById('alertPreview');
        const previewText = document.getElementById('previewText');
        const previewMedia = document.getElementById('previewMedia');
        const previewVideo = document.getElementById('previewVideo');

        const sampleAssets = {
            image: 'https://placekitten.com/900/500',
            video: 'https://samplelib.com/lib/preview/mp4/sample-5s.mp4',
        };

        const formatFileSize = (bytes) => {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        };

        const getTwitchChannel = () => localStorage.getItem('nombreTwitch')?.toLowerCase() || '';

        const setStatus = (message, success = true) => {
            statusBox.style.display = 'block';
            statusBox.style.borderColor = success ? 'rgba(0,255,153,0.3)' : 'rgba(255,99,132,0.3)';
            statusBox.innerText = message;
        };

        // Cargar Google Fonts
        async function cargarFuentesDeGoogle() {
            try {
                const response = await fetch(`https://www.googleapis.com/webfonts/v1/webfonts?sort=popularity&key=${API_KEY}`);
                const data = await response.json();

                if (data.items) {
                    const fontesParaCargar = data.items.slice(0, 150);
                    const familias = fontesParaCargar.map(font => font.family);
                    
                    WebFont.load({ google: { families: familias } });

                    fuenteSelect.innerHTML = '';
                    fontesParaCargar.forEach(font => {
                        const option = document.createElement('option');
                        option.value = font.family;
                        option.textContent = font.family;
                        option.style.fontFamily = `'${font.family}', sans-serif`;
                        fuenteSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error("Error al cargar fuentes:", error);
            }
        }

        // Actualizar preview
        const updatePreview = () => {
            const effects = [];
            if (effectVibrate.checked) effects.push('effect-vibrate');
            if (effectBounce.checked) effects.push('effect-bounce');
            if (effectZoom.checked) effects.push('effect-zoom');

            alertPreview.className = effects.join(' ');
            previewText.textContent = textInput.value || 'Texto de la alerta';
            previewText.style.fontSize = fontSizeInput.value + 'px';
            previewText.style.fontFamily = `'${fuenteSelect.value}', sans-serif`;
            previewText.style.color = textColorInput.value;
        };

        // Subir archivo a Cloudinary
        const handleFileUpload = async (file, isSound = false) => {
            if (!file) {
                if (isSound) uploadedSoundUrl = '';
                else uploadedFileUrl = '';
                return;
            }

            if (file.size > MAX_FILE_SIZE) {
                const span = isSound ? soundInfoSpan : fileInfoSpan;
                span.style.color = '#ff6464';
                span.textContent = `❌ Archivo muy grande: ${formatFileSize(file.size)}`;
                span.style.display = 'block';
                return;
            }

            const span = isSound ? soundInfoSpan : fileInfoSpan;
            span.style.color = '#fbbf24';
            span.textContent = `⏳ Subiendo: ${file.name}...`;
            span.style.display = 'block';

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                formData.append('public_id', `alerts/${Date.now()}-${file.name}`);

                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`,
                    { method: 'POST', body: formData }
                );

                if (!response.ok) throw new Error(`Error: ${response.statusText}`);

                const data = await response.json();
                const url = data.secure_url;

                if (isSound) {
                    uploadedSoundUrl = url;
                    soundInfoSpan.style.color = '#4ade80';
                    soundInfoSpan.textContent = `✅ Sonido subido`;
                } else {
                    uploadedFileUrl = url;
                    assetInput.value = url;
                    fileInfoSpan.style.color = '#4ade80';
                    fileInfoSpan.textContent = `✅ Archivo subido`;
                    previewMedia.src = url;
                    previewVideo.src = url;
                    updateMediaPreview();
                }
            } catch (error) {
                console.error('Error:', error);
                span.style.color = '#ff6464';
                span.textContent = `❌ Error: ${error.message}`;
            }
        };

        const updateMediaPreview = () => {
            const tipo = tipoSelect.value;
            previewMedia.style.display = 'none';
            previewVideo.style.display = 'none';
            const url = assetInput.value;
            if (!url) return;
            
            if (tipo === 'video') {
                previewVideo.src = url;
                previewVideo.style.display = 'block';
            } else {
                previewMedia.src = url;
                previewMedia.style.display = 'block';
            }
        };

        // Listeners
        assetFileInput.addEventListener('change', (e) => handleFileUpload(e.target.files[0], false));
        soundFileInput.addEventListener('change', (e) => handleFileUpload(e.target.files[0], true));
        fontSizeInput.addEventListener('input', () => {
            sizeValue.textContent = fontSizeInput.value + 'px';
            updatePreview();
        });
        fuenteSelect.addEventListener('change', updatePreview);
        textColorInput.addEventListener('input', updatePreview);
        textInput.addEventListener('input', updatePreview);
        effectVibrate.addEventListener('change', updatePreview);
        effectBounce.addEventListener('change', updatePreview);
        effectZoom.addEventListener('change', updatePreview);
        tipoSelect.addEventListener('change', updateMediaPreview);
        assetInput.addEventListener('input', updateMediaPreview);

        // Crear alerta
        const createAlert = async (type, assetUrl, text) => {
            if (!auth.currentUser && !getTwitchChannel()) {
                alert('Tenés que iniciar sesión');
                window.parent.location.href = '/index.html';
                return;
            }

            const canal = canalInput.value.trim().toLowerCase() || getTwitchChannel();
            const url = assetUrl || assetInput.value.trim();
            const alertText = text || textInput.value.trim();
            const soundUrl = uploadedSoundUrl || '';

            if (!canal || !url) {
                setStatus('Completa todos los campos', false);
                return;
            }

            try {
                await addDoc(collection(db, 'liveAlerts'), {
                    canal, type, assetUrl: url, soundUrl, text: alertText,
                    fuente: fuenteSelect.value,
                    fontSize: parseInt(fontSizeInput.value),
                    textColor: textColorInput.value,
                    effects: {
                        vibrate: effectVibrate.checked,
                        bounce: effectBounce.checked,
                        zoom: effectZoom.checked
                    },
                    duration: parseInt(durationInput.value),
                    status: 'pending',
                    createdAt: serverTimestamp()
                });
                setStatus('✅ Alerta creada');
                assetFileInput.value = '';
                soundFileInput.value = '';
                fileInfoSpan.style.display = 'none';
                soundInfoSpan.style.display = 'none';
            } catch (error) {
                setStatus('Error: ' + error.message, false);
            }
        };

        const updateOverlayLink = () => {
            const canal = canalInput.value.trim().toLowerCase() || getTwitchChannel();
            const url = canal ? `${window.location.origin}/html/overlay.html?canal=${canal}` : `${window.location.origin}/html/overlay.html`;
            overlayLinkInput.value = url;
        };

        onAuthStateChanged(auth, (user) => {
            if (getTwitchChannel()) {
                canalInput.value = getTwitchChannel();
                canalInput.readOnly = true;
            }
            updateOverlayLink();
        });

        createButton.addEventListener('click', () => createAlert(tipoSelect.value));
        copyOverlay.addEventListener('click', () => {
            overlayLinkInput.select();
            document.execCommand('copy');
            setStatus('Link copiado');
        });
        openOverlay.addEventListener('click', () => window.open(updateOverlayLink(), '_blank'));
        sampleImage.addEventListener('click', () => {
            tipoSelect.value = 'image';
            assetInput.value = sampleAssets.image;
            textInput.value = 'Prueba de imagen';
            updatePreview();
            updateMediaPreview();
            createAlert('image', sampleAssets.image, 'Prueba');
        });
        sampleVideo.addEventListener('click', () => {
            tipoSelect.value = 'video';
            assetInput.value = sampleAssets.video;
            textInput.value = 'Prueba de video';
            updatePreview();
            updateMediaPreview();
            createAlert('video', sampleAssets.video, 'Prueba');
        });
        canalInput.addEventListener('input', updateOverlayLink);

        cargarFuentesDeGoogle();
        updatePreview();
    </script>
</body>
</html>
