<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad - Interactive With You</title>
    <style>
        body { background: transparent; color: white; font-family: 'Poppins', sans-serif; padding: 20px; }
        .comunidad-container { max-width: 600px; margin: auto; }
        h2 { color: #a970ff; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; background: #11101d; border: 1px solid #9147ff; color: white; border-radius: 8px; padding: 10px; margin-bottom: 10px; resize: none; font-size: 1rem; }
        button { background: #9147ff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #bf94ff; transform: scale(1.05); }
        .mensaje-card { background: #1d1b31; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid #9147ff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .autor { color: #a970ff; font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        p { margin: 0; line-height: 1.4; color: #efeff1; }
    </style>
</head>
<body>
    <div class="comunidad-container">
        <h2>Muro de la Comunidad 💬</h2>
        <textarea id="nuevo-comentario" placeholder="Dejame un comentario..."></textarea>
        <button id="btn-enviar">Publicar Mensaje</button>

        <div id="lista-mensajes"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
            authDomain: "interactivewithyou.firebaseapp.com",
            projectId: "interactivewithyou",
            storageBucket: "interactivewithyou.firebasestorage.app",
            messagingSenderId: "220446228684",
            appId: "1:220446228684:web:759044ab4365962d300269"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const audioNotificacion = new Audio('assets/notificacion.mp3'); 
        let cargaInicial = true;

        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        function enviarNotificacionWindows(usuario, mensaje) {
            if (Notification.permission === "granted") {
                const n = new Notification(`Interactive With You: Mensaje de ${usuario}`, {
                    body: mensaje
                });
                n.onclick = () => window.focus();
            }
        }

        document.getElementById('btn-enviar').onclick = async () => {
            const texto = document.getElementById('nuevo-comentario').value;
            const user = auth.currentUser;

            if (texto.trim() !== "" && user) {
                try {
                    await addDoc(collection(db, "comunidad"), {
                        nombre: user.displayName,
                        texto: texto,
                        fecha: serverTimestamp()
                    });
                    document.getElementById('nuevo-comentario').value = "";
                } catch (error) {
                    console.error("Error al enviar mensaje:", error);
                }
            }
        };

        const q = query(collection(db, "comunidad"), orderBy("fecha", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('lista-mensajes');
            
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" && !cargaInicial) {
                    const data = change.doc.data();
                    audioNotificacion.play().catch(() => {});
                    enviarNotificacionWindows(data.nombre, data.texto);
                }
            });

            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'mensaje-card';
                div.innerHTML = `
                    <span class="autor">${data.nombre}</span>
                    <p>${data.texto}</p>
                `;
                lista.appendChild(div);
            });

            cargaInicial = false; 
        });
    </script>
</body>
</html>
