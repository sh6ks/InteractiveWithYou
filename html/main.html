<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>InteractiveWithYou - Inicio</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { 
            background: #0e0e10 !important; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 40px;
        }
        h1 { font-size: 3rem; color: #a970ff; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #adadb8; margin-bottom: 40px; }
        
        .opciones {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        
        .btn-main {
            background: #26262c;
            border: 2px solid #3f3f46;
            padding: 30px;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            width: 250px;
            transition: all 0.3s ease;
        }
        
        .btn-main:hover {
            border-color: #9147ff;
            transform: translateY(-5px);
            background: #1f1f23;
        }
        
        .btn-main i { font-size: 2rem; display: block; margin-bottom: 15px; }
        .btn-main strong { font-size: 1.3rem; color: #9147ff; }
    </style>
</head>
<body>

<div class="container">
    <h1>InteractiveWithYou</h1>
    <p>La herramienta definitiva para potenciar la interacción en tu stream.</p>

    <div class="opciones">
        <a href="config.html" class="btn-main">
            <strong>✨ Crear Chat</strong>
            <p>Configurá tu widget por primera vez.</p>
        </a>

        <a href="config.html" class="btn-main">
            <strong>⚙️ Modificar</strong>
            <p>Cambiá los colores o la fuente de tu chat.</p>
        </a>
    </div>
</div>

</body>
</html>
