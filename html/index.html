<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>InteractiveWithYou - Inicio</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { 
            background: #0e0e10 !important; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            color: white;
            text-align: center;
        }
        .card {
            background: #1f1f23;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 { color: #a970ff; margin-bottom: 10px; }
        .btn-google {
            background: #4285F4;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-google:hover { background: #357abd; }
        .btn-config {
            display: inline-block;
            margin-top: 15px;
            background: #9147ff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>InteractiveWithYou</h1>
        <p>El widget de chat dinámico para tu stream.</p>
        <br>
        <div id="auth-section">
            <p>Cargando...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        //  config de Firebase 
        const firebaseConfig = {
            apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
            authDomain: "interactivewithyou.firebaseapp.com",
            projectId: "interactivewithyou",
            storageBucket: "interactivewithyou.firebasestorage.app",
            messagingSenderId: "220446228684",
            appId: "1:220446228684:web:759044ab4365962d300269"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Funciones globales para los botones
        window.login = () => signInWithPopup(auth, provider).catch(console.error);
        window.logout = () => signOut(auth);

        // Cambiar lo que ve el usuario según si está logueado o no
        onAuthStateChanged(auth, (user) => {
            const section = document.getElementById('auth-section');
            if (user) {
                section.innerHTML = `
                    <p>Hola, <strong>${user.displayName}</strong></p>
                    <a href="config.html" class="btn-config">Configurar mi Chat</a>
                    <br><br>
                    <button onclick="logout()" style="background:none; border:none; color:gray; cursor:pointer;">Cerrar sesión</button>
                `;
            } else {
                section.innerHTML = `
                    <button class="btn-google" onclick="login()">Entrar con Google</button>
                `;
            }
        });
    </script>
</body>
</html>
