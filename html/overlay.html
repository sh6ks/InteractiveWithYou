<!DOCTYPE html>
<html lang="es">
<!--
  overlay.html
  Overlay de alerta para OBS que reproduce imágenes, videos o sonidos desde Firestore.
-->
<head>
    <meta charset="UTF-8" />
    <title>Overlay de alertas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        body { display: grid; place-items: center; font-family: 'Poppins', sans-serif; }
        #alertContainer { position: relative; width: 100%; height: 100%; }
        .alert-box { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: transparent; }
        .alert-card { max-width: 900px; width: 100%; background: transparent; border: none; border-radius: 26px; overflow: hidden; box-shadow: none; display: flex; flex-direction: column; gap: 14px; padding: 24px; }
        .alert-card.position-top { flex-direction: column; }
        .alert-card.position-center { flex-direction: column; }
        .alert-card.position-bottom { flex-direction: column-reverse; }
        .alert-card.position-left { flex-direction: row; align-items: center; }
        .alert-card.position-right { flex-direction: row-reverse; align-items: center; }
        .alert-media { width: 100%; max-height: 480px; overflow: hidden; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: transparent; }
        .alert-card.position-left .alert-media, .alert-card.position-right .alert-media { width: 55%; }
        .alert-media img, .alert-media video { max-width: 100%; max-height: 100%; }
        .alert-text { color: #f7f3ff; text-align: center; font-size: clamp(1.4rem, 2vw, 2.8rem); font-weight: 800; text-shadow: 0 0 24px rgba(145,71,255,0.45); }
        .sound-only { font-size: 2rem; color: #b9a4ff; text-align: center; }
        @keyframes vibrate { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-28px); } }
        @keyframes zoomAnim { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes slideLeft { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-18px); } }
        @keyframes pulseSoft { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes rotateSwing { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-4deg); } 75% { transform: rotate(4deg); } }
        @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
        @keyframes shakeHard { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-9px); } 40% { transform: translateX(9px); } 60% { transform: translateX(-7px); } 80% { transform: translateX(7px); } }
        .effect-vibrate { animation: vibrate 0.4s infinite; }
        .effect-bounce { animation: bounce 0.7s infinite; }
        .effect-zoom { animation: zoomAnim 0.9s infinite; }
        .effect-slide-left { animation: slideLeft 0.8s infinite; }
        .effect-pulse { animation: pulseSoft 0.85s infinite; }
        .effect-rotate { animation: rotateSwing 0.9s infinite; }
        .effect-float { animation: floatY 1.2s ease-in-out infinite; }
        .effect-shake-hard { animation: shakeHard 0.35s infinite; }
        .hidden { display: none !important; }
        .debug-hud {
            position: fixed;
            left: 12px;
            bottom: 12px;
            z-index: 9999;
            min-width: 280px;
            max-width: 420px;
            border-radius: 12px;
            border: 1px solid rgba(145, 71, 255, 0.55);
            background: rgba(8, 7, 20, 0.88);
            color: #f1ecff;
            padding: 10px 12px;
            font: 12px/1.45 Consolas, 'Courier New', monospace;
            box-shadow: 0 10px 28px rgba(0,0,0,0.45);
            pointer-events: none;
            white-space: pre-line;
        }
        .alert-debug-meta {
            border-radius: 10px;
            border: 1px dashed rgba(145, 71, 255, 0.65);
            background: rgba(10, 8, 24, 0.85);
            color: #cfc2ff;
            padding: 8px 10px;
            font: 12px/1.4 Consolas, 'Courier New', monospace;
            white-space: pre-line;
        }
    </style>
</head>
<body>
<!-- Contenedor dinámico donde se muestran las alertas emitidas desde Firebase -->
    <div id="alertContainer"></div>
    <div id="debugHud" class="debug-hud hidden"></div>

    <script type="module">
        // Script del overlay: recibe alertas pendientes desde Firestore y las muestra visualmente.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb5rrwIy-obPXV6eukbuUmTiRVVAHFfiE",
            authDomain: "interactivewithyou.firebaseapp.com",
            projectId: "interactivewithyou",
            storageBucket: "interactivewithyou.firebasestorage.app",
            messagingSenderId: "220446228684",
            appId: "1:220446228684:web:759044ab4365962d300269"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const canalParam = urlParams.get('canal')?.toLowerCase();
        const debugEnabled = urlParams.get('debug') === '1';

        // Query sin combinaciones que requieran índice compuesto
        const alertsQuery = canalParam
            ? query(collection(db, 'liveAlerts'), where('canal', '==', canalParam))
            : query(collection(db, 'liveAlerts'));

        const container = document.getElementById('alertContainer');
        const debugHud = document.getElementById('debugHud');
        const shownIds = new Set();
        const alertQueue = [];
        let active = false;
        let lastEvent = 'ninguno';
        let lastDocId = '-';

        const renderDebugHud = (extra = '') => {
            if (!debugEnabled) return;
            debugHud.classList.remove('hidden');
            debugHud.textContent = [
                'IWY Overlay Debug',
                `Canal: ${canalParam || '(sin canal)'}`,
                `Activa: ${active ? 'si' : 'no'}`,
                `Pendientes cache: ${shownIds.size}`,
                `Ultimo evento: ${lastEvent}`,
                `Ultimo doc: ${lastDocId}`,
                extra ? `Info: ${extra}` : ''
            ].filter(Boolean).join('\n');
        };

        const inferAnimation = (data) => {
            if (data.animation) return data.animation;
            if (data.effects?.vibrate) return 'vibrate';
            if (data.effects?.bounce) return 'bounce';
            if (data.effects?.zoom) return 'zoom';
            return 'none';
        };

        // Crea el elemento visual de alerta según el tipo de asset.
        const createAlertElement = (data) => {
            const card = document.createElement('div');
            card.className = 'alert-box';

            const body = document.createElement('div');
            body.className = 'alert-card';
            const position = data.mediaPosition || 'center';
            body.classList.add(`position-${position}`);

            const media = document.createElement('div');
            media.className = 'alert-media';

            if (data.type === 'image') {
                const img = document.createElement('img');
                img.src = data.assetUrl;
                img.alt = data.text || 'Alerta';
                media.appendChild(img);
            } else if (data.type === 'video') {
                const video = document.createElement('video');
                video.src = data.assetUrl;
                video.autoplay = true;
                video.muted = false;
                video.controls = false;
                video.playsInline = true;
                video.style.objectFit = 'contain';
                media.appendChild(video);
            } else {
                const audio = document.createElement('audio');
                audio.src = data.assetUrl;
                audio.autoplay = true;
                audio.controls = false;
                audio.style.display = 'none';
                media.appendChild(audio);

                const soundText = document.createElement('div');
                soundText.className = 'sound-only';
                soundText.innerText = data.text || 'Reproduciendo sonido...';
                media.appendChild(soundText);
            }

            const text = document.createElement('div');
            text.className = 'alert-text';
            text.innerText = data.text || '¡Alerta en vivo!';
            text.style.fontFamily = data.fuente || 'Poppins, sans-serif';
            text.style.fontSize = `${Number(data.fontSize) || 32}px`;
            text.style.color = data.textColor || '#f7f3ff';

            const animationClassMap = {
                vibrate: 'effect-vibrate',
                bounce: 'effect-bounce',
                zoom: 'effect-zoom',
                'slide-left': 'effect-slide-left',
                pulse: 'effect-pulse',
                rotate: 'effect-rotate',
                float: 'effect-float',
                'shake-hard': 'effect-shake-hard'
            };
            const animationClass = animationClassMap[inferAnimation(data)];
            if (animationClass) media.classList.add(animationClass);

            if (debugEnabled) {
                const debugMeta = document.createElement('div');
                debugMeta.className = 'alert-debug-meta';
                debugMeta.textContent = [
                    `Nombre: ${data.nombre || '(sin nombre)'}`,
                    `Evento: ${data.eventType || 'generico'}`,
                    `Asset: ${data.type || 'unknown'}`,
                    `Canal: ${data.canal || '(sin canal)'}`
                ].join('\n');
                body.appendChild(debugMeta);
            }

            body.appendChild(media);
            body.appendChild(text);

            if (data.soundUrl && data.type !== 'sound') {
                const extraAudio = document.createElement('audio');
                extraAudio.src = data.soundUrl;
                extraAudio.autoplay = true;
                extraAudio.controls = false;
                extraAudio.style.display = 'none';
                body.appendChild(extraAudio);
            }

            card.appendChild(body);
            return card;
        };

        const enqueueAlert = (docSnap) => {
            if (shownIds.has(docSnap.id)) return;
            alertQueue.push(docSnap);
            processQueue();
        };

        const processQueue = async () => {
            if (active || alertQueue.length === 0) return;
            const nextDoc = alertQueue.shift();
            await playAlert(nextDoc);
        };

        // Reproduce la alerta y actualiza su estado a 'shown' cuando finaliza.
        const playAlert = async (docSnap) => {
            if (shownIds.has(docSnap.id)) return;
            shownIds.add(docSnap.id);
            active = true;

            const data = docSnap.data();
            lastEvent = `${data.eventType || 'generico'} (${data.type || 'unknown'})`;
            lastDocId = docSnap.id;
            renderDebugHud('Reproduciendo alerta');
            const alertEl = createAlertElement(data);
            alertEl.style.display = 'flex';
            container.appendChild(alertEl);

            const duration = Number(data.duration) || 8;
            const video = alertEl.querySelector('video');
            const audios = alertEl.querySelectorAll('audio');

            if (video) {
                await video.play().catch(() => {});
            }
            audios.forEach(a => a.play().catch(() => {}));

            setTimeout(async () => {
                alertEl.remove();
                active = false;
                renderDebugHud('Alerta finalizada');
                try {
                    await updateDoc(doc(db, 'liveAlerts', docSnap.id), { status: 'shown' });
                } catch (err) {
                    console.error('No se pudo actualizar el estado de la alerta', err);
                    renderDebugHud('Error actualizando status shown');
                }
                processQueue();
            }, duration * 1000);
        };

        renderDebugHud('Esperando cambios de Firestore');
        onSnapshot(alertsQuery, (snapshot) => {
            renderDebugHud(`Snapshot docs: ${snapshot.size}`);
            snapshot.docChanges().forEach(change => {
                const data = change.doc.data();
                if ((change.type === 'added' || change.type === 'modified') && data.status === 'pending') {
                    enqueueAlert(change.doc);
                }
            });
        }, (error) => {
            console.error('Error en listener de overlay:', error);
            renderDebugHud(`Error listener: ${error.message || 'desconocido'}`);
        });
    </script>
</body>
</html>
